<script>
// --- Lichess OAuth PKCE Integration ---
const LICHESS_CLIENT_ID = 'chess-pro-gas'; 

function base64URLEncode(str) {
  return btoa(String.fromCharCode.apply(null, new Uint8Array(str)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function generateCodeChallenge(codeVerifier) {
  const encoder = new TextEncoder();
  const data = encoder.encode(codeVerifier);
  const digest = await window.crypto.subtle.digest('SHA-256', data);
  return base64URLEncode(digest);
}

function generateRandomString(length) {
  const charset = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  let result = '';
  const values = new Uint32Array(length);
  window.crypto.getRandomValues(values);
  for (let i = 0; i < length; i++) {
    result += charset[values[i] % charset.length];
  }
  return result;
}

let lichessToken = localStorage.getItem('lichess_token');
let lichessUser = null;

async function checkLichessLogin() {
  try {
    // 1. Check if we just came back from Lichess auth
    if (window.URL_PARAMS && window.URL_PARAMS.code) {
      console.log("Found Lichess auth code, exchanging for token...");
      await exchangeLichessCode(window.URL_PARAMS.code);
      // Remove code from URL visually if possible (sandbox may block this)
      try {
        window.history.replaceState({}, document.title, window.location.pathname);
      } catch(e) {
        console.warn("Could not replace history state:", e);
      }
    }

    // 2. Check token validity and get user info
    if (lichessToken) {
      const res = await fetch('https://lichess.org/api/account', {
        headers: { 'Authorization': 'Bearer ' + lichessToken }
      });
      if (res.ok) {
        lichessUser = await res.json();
      } else {
        console.warn("Lichess token invalid, clearing.");
        logoutLichess();
      }
    }
  } catch(e) {
    console.error("Error verifying Lichess account", e);
  } finally {
    updateLichessUI();
  }
}

async function loginLichess() {
  try {
    const state = generateRandomString(32);
    const codeVerifier = generateRandomString(64);
    localStorage.setItem('lichess_pkce_state', state);
    localStorage.setItem('lichess_pkce_verifier', codeVerifier);

    let codeChallengeMethod = 'S256';
    let codeChallenge = '';
    
    // Safe check for Crypto API (often restricted in iframes)
    if (window.crypto && window.crypto.subtle) {
      codeChallenge = await generateCodeChallenge(codeVerifier);
    } else {
      console.warn("Crypto.subtle not available in iframe sandbox. Falling back to plain method.");
      codeChallengeMethod = 'plain';
      codeChallenge = codeVerifier;
    }
    
    const redirectUri = window.SCRIPT_URL || window.location.href.split('?')[0];

    const authUrl = `https://lichess.org/oauth?response_type=code` + 
      `&client_id=${LICHESS_CLIENT_ID}` + 
      `&redirect_uri=${encodeURIComponent(redirectUri)}` + 
      `&code_challenge_method=${codeChallengeMethod}` + 
      `&code_challenge=${codeChallenge}` + 
      `&state=${state}` + 
      `&scope=board:play`;

    console.log("Initiating Lichess OAuth to:", authUrl);

    // Strategy 1: Create a hidden anchor tag with target="_top" and click it
    // This is the most reliable way to escape strict iframe sandboxes in modern browsers.
    const a = document.createElement('a');
    a.href = authUrl;
    a.target = '_top';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // Strategy 2: Direct assignment fallback
    setTimeout(() => {
      try {
        window.top.location.href = authUrl;
      } catch(e) {
        console.warn("Direct top location assignment failed:", e);
      }
    }, 100);

  } catch(err) {
    alert("Failed to initiate Lichess login:\n" + err.message);
    console.error(err);
  }
}

async function exchangeLichessCode(code) {
  const codeVerifier = localStorage.getItem('lichess_pkce_verifier');
  
  if (!codeVerifier) {
    console.error("Missing PKCE verifier");
    return;
  }
  
  const redirectUri = window.SCRIPT_URL || window.location.href.split('?')[0];
  
  try {
    const res = await fetch('https://lichess.org/api/token', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded'
      },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        code: code,
        code_verifier: codeVerifier,
        redirect_uri: redirectUri,
        client_id: LICHESS_CLIENT_ID
      })
    });
    
    const data = await res.json();
    if (data.access_token) {
      lichessToken = data.access_token;
      localStorage.setItem('lichess_token', lichessToken);
      localStorage.removeItem('lichess_pkce_verifier');
      localStorage.removeItem('lichess_pkce_state');
    } else {
      console.error("Token exchange failed", data);
      alert("Lichess Token Exchange failed: " + (data.error_description || data.error));
    }
  } catch(e) {
    console.error("Error exchanging token", e);
    alert("Network error during Lichess token exchange.");
  }
}

function logoutLichess() {
  if (lichessToken) {
    fetch('https://lichess.org/api/token', {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + lichessToken }
    }).catch(e => console.warn(e));
  }
  lichessToken = null;
  lichessUser = null;
  localStorage.removeItem('lichess_token');
  updateLichessUI();
}

function updateLichessUI() {
  const statusEl = document.getElementById('lichess-status-text');
  const loginBtn = document.getElementById('btn-lichess-login');
  const logoutBtn = document.getElementById('btn-lichess-logout');
  const menuBtn = document.getElementById('btn-lichess-menu');

  if (lichessUser) {
    if (statusEl) statusEl.innerText = `Logged in as ${lichessUser.username}`;
    if (loginBtn) loginBtn.classList.add('hidden');
    if (logoutBtn) logoutBtn.classList.remove('hidden');
    if (menuBtn) menuBtn.classList.remove('hidden');
  } else {
    if (statusEl) statusEl.innerText = 'Not logged in';
    if (loginBtn) loginBtn.classList.remove('hidden');
    if (logoutBtn) logoutBtn.classList.add('hidden');
    if (menuBtn) menuBtn.classList.add('hidden');
  }
}

async function startLichessBotGame() {
  const loading = document.getElementById('lichess-loading');
  if (loading) loading.classList.remove('hidden');
  try {
    const res = await fetch('https://lichess.org/api/challenge/maia1', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + lichessToken },
      body: new URLSearchParams({
        rated: false,
        clock_limit: 300,
        clock_increment: 0,
        color: 'random',
        level: 1
      })
    });
    const data = await res.json();
    if (data.challenge && data.challenge.id) {
      alert("Challenge sent! ID: " + data.challenge.id + "\n(Integration to play directly on board is WIP)");
    } else {
      alert("Failed to challenge bot");
    }
  } catch(e) {
    alert("Error challenging bot");
  } finally {
    if (loading) loading.classList.add('hidden');
  }
}

async function seekLichessGame() {
  const loading = document.getElementById('lichess-loading');
  if (loading) loading.classList.remove('hidden');
  try {
    alert("Lichess Seek API initiated.\n(Streaming Board API integration required for full gameplay)");
  } finally {
    if (loading) loading.classList.add('hidden');
  }
}

// Call on startup
window.addEventListener('DOMContentLoaded', () => {
  checkLichessLogin();
});
</script>
