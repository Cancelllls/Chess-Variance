<script>
// Game State
let game = new Chess();
let boardFlipped = false;
let showCoords = true;
let showHints = false;

// Multiplayer & Mode State
let gameMode = 'local'; // 'local', 'ai', 'online', 'puzzle', 'analysis'
let playerColor = 'w';
let playerRole = 'player'; // 'player' or 'spectator'
let playerName = "Guest";
let roomId = null;
let pollInterval = null;
let clockInterval = null;
let aiDepth = 2;
let isWaitingForServer = false;
const errorCallback = (e) => console.warn("Network Warning:", e);

// Clock State
let whiteTime = 300000;
let blackTime = 300000;
let lastServerSync = Date.now();
let isGamePaused = false;

// DOM Elements
let boardEl, moveListEl, promoDialog, premoveToggle, svgLayer;
let pendingMove = null;
let selectedSquare = null;

// Premove & SVG State
let pendingPremove = null;
let isRightClickDragging = false;
let rightClickStartSq = null;
let currentRightClickSq = null;

// Resilience State
let pollRetryCount = 0;
let backoffDelay = 1000;
let connectionStatus = 'green'; 

// --- AUDIO & HAPTICS CONTROLLER ---
const AudioController = {
  muted: false,
  ctx: null,
  init() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (this.ctx && this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  },
  play(type) {
    if (this.muted) return;
    
    // Hardware Haptics (Vibration API)
    if (navigator.vibrate) {
      if (type === 'move') navigator.vibrate(15);
      else if (type === 'capture') navigator.vibrate([30, 50, 30]);
      else if (type === 'check' || type === 'gameEnd') navigator.vibrate([100, 50, 100, 50, 200]);
    }

    // Web Audio Synthesis (Offline Bleeps)
    try {
      this.init();
      if (!this.ctx) return;
      const now = this.ctx.currentTime;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      
      if (type === 'move') { osc.frequency.setValueAtTime(600, now); gain.gain.setValueAtTime(0.1, now); }
      else if (type === 'capture') { osc.frequency.setValueAtTime(400, now); gain.gain.setValueAtTime(0.2, now); }
      else if (type === 'check') { osc.frequency.setValueAtTime(800, now); gain.gain.setValueAtTime(0.2, now); }
      else if (type === 'gameEnd') { osc.frequency.setValueAtTime(300, now); gain.gain.setValueAtTime(0.3, now); }
      
      osc.start(now);
      gain.gain.exponentialRampToValueAtTime(0.00001, now + 0.1);
      osc.stop(now + 0.15);
    } catch(e) {}
  }
};

// Wake audio context on first user interaction
document.body.addEventListener('click', () => AudioController.init(), { once: true });

document.getElementById('mute-toggle').addEventListener('click', function() {
  AudioController.muted = !AudioController.muted;
  this.innerText = AudioController.muted ? '🔇' : '🔊';
});

function setConnectionStatus(status) {
  connectionStatus = status;
  const dot = document.getElementById('connection-status');
  const modal = document.getElementById('disconnect-modal');
  
  if (dot) dot.className = 'conn-dot ' + status;
  
  // Show reconnecting modal for any non-green status
  if (modal) {
    if (status === 'yellow' || status === 'red') {
      modal.classList.remove('hidden');
    } else {
      modal.classList.add('hidden');
    }
  }
}

// --- CLOCK LOGIC ---
function updateClocks() {
  const now = Date.now();
  if (gameMode === 'online' && !game.game_over() && !isGamePaused) {
    if (whiteTime !== null && blackTime !== null) {
      const elapsed = now - lastServerSync;
      if (game.turn() === 'w') whiteTime = Math.max(0, whiteTime - elapsed);
      else blackTime = Math.max(0, blackTime - elapsed);
      lastServerSync = now;
      
      if (whiteTime <= 0 || blackTime <= 0) {
        if (clockInterval) clearInterval(clockInterval);
      }
    }
  } else {
    // If paused or local/AI, just keep the sync anchor moving to avoid sudden jumps
    lastServerSync = now;
  }
  
  const formatTime = (ms) => {
    if (ms === null) return "∞";
    const totalSec = Math.floor(ms / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
  };

  const wEl = document.getElementById('clock-white');
  const bEl = document.getElementById('clock-black');
  if(wEl) wEl.innerText = formatTime(whiteTime);
  if(bEl) bEl.innerText = formatTime(blackTime);
  
  if(wEl) {
    wEl.classList.toggle('active', game.turn() === 'w' && whiteTime !== null);
    wEl.classList.toggle('low-time', whiteTime !== null && whiteTime < 30000);
  }
  if(bEl) {
    bEl.classList.toggle('active', game.turn() === 'b' && blackTime !== null);
    bEl.classList.toggle('low-time', blackTime !== null && blackTime < 30000);
  }
}

// --- WELCOME SCREEN LOGIC ---
function showMenu(id) {
  document.querySelectorAll('.menu-section').forEach(el => el.classList.add('hidden'));
  const target = document.getElementById(id);
  if (target) target.classList.remove('hidden');
}

/**
 * UI STATE MANAGEMENT
 */
function setGameState(isInGame) {
  const ws = document.getElementById('welcome-screen');
  const mainApp = document.getElementById('main-app');
  const waitOverlay = document.getElementById('waiting-overlay');
  
  if (isInGame) {
    if (ws) {
      ws.style.setProperty('display', 'none', 'important');
      ws.style.setProperty('z-index', '-1', 'important');
      ws.classList.add('hidden');
    }
    if (waitOverlay) waitOverlay.classList.add('hidden');
    if (mainApp) {
      mainApp.style.setProperty('display', 'flex', 'important');
      mainApp.style.setProperty('visibility', 'visible', 'important');
      mainApp.style.setProperty('opacity', '1', 'important');
      mainApp.style.setProperty('filter', 'none', 'important');
      mainApp.style.setProperty('pointer-events', 'auto', 'important');
      mainApp.classList.remove('hidden');
    }
    if (clockInterval) clearInterval(clockInterval);
    clockInterval = setInterval(updateClocks, 1000);
  } else {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
    if (ws) {
      ws.style.setProperty('display', 'flex', 'important');
      ws.style.setProperty('z-index', '2000', 'important');
      ws.style.setProperty('visibility', 'visible', 'important');
      ws.style.setProperty('opacity', '1', 'important');
      ws.classList.remove('hidden');
    }
    if (mainApp) {
      mainApp.style.setProperty('display', 'none', 'important');
      mainApp.style.setProperty('filter', 'blur(5px)', 'important');
      mainApp.style.setProperty('pointer-events', 'none', 'important');
      mainApp.classList.add('hidden');
    }
    if (waitOverlay) waitOverlay.classList.add('hidden');
    showMenu('menu-main');
    roomId = null;
    playerRole = 'player';
    setConnectionStatus('green');
  }
}

function closeWelcomeScreen() {
  const nameEl = document.getElementById('player-name-input');
  playerName = (nameEl && nameEl.value) ? nameEl.value.trim() : "Guest";
  setGameState(true);
}

function openWelcomeScreen() {
  setGameState(false);
  if (boardEl) {
    const overlay = boardEl.querySelector('.game-over-overlay');
    if (overlay) overlay.remove();
  }
}

function startLocalMultiplayer() {
  closeWelcomeScreen();
  gameMode = 'local';
  game.reset();
  boardFlipped = false;
  whiteTime = blackTime = null; // Unlimited for local
  updateBoard();
  const infoEl = document.getElementById('game-info-panel');
  if (infoEl) infoEl.innerText = "Local Pass & Play";
}

function startAIGame(color) {
  closeWelcomeScreen();
  gameMode = 'ai';
  playerColor = color;
  const diffSlider = document.getElementById('ai-diff-slider');
  aiDepth = diffSlider ? parseInt(diffSlider.value) : 2;
  game.reset();
  boardFlipped = (color === 'b');
  whiteTime = blackTime = null; // Unlimited for AI
  updateBoard();
  const infoEl = document.getElementById('game-info-panel');
  if (infoEl) infoEl.innerText = "Playing vs Computer";
  if (color === 'b') setTimeout(makeAIMove, 250);
}

function createOnlineRoom() {
  const pName = document.getElementById('player-name-input').value || "Guest";
  const timeControl = document.getElementById('time-control-select').value;
  document.getElementById('online-status').innerText = "Creating room...";
  const undoBtn = document.getElementById('btnUndo');
  undoBtn.innerText = "Undo";
  undoBtn.disabled = false;
  try {
    google.script.run
      .withSuccessHandler(id => {
        closeWelcomeScreen();
        roomId = id;
        gameMode = 'online';
        playerColor = 'w';
        playerRole = 'player';
        boardFlipped = false;
        game.reset();
        const tc = (timeControl === "null") ? null : parseInt(timeControl, 10);
        whiteTime = blackTime = tc;
        updateBoard();
        const infoEl = document.getElementById('game-info-panel');
        if (infoEl) infoEl.innerText = "Room Code: " + roomId;
        startPolling();
      })
      .withFailureHandler(e => {
        document.getElementById('online-status').innerText = "Server Error: Failed to create room.";
      })
      .createRoom(pName, timeControl);
  } catch(e) {
    document.getElementById('online-status').innerText = "Error: Network error detected.";
  }
}

function joinOnlineRoom() {
  const id = document.getElementById('room-code-input').value.toUpperCase();
  if(id.length !== 4) return;
  const pName = document.getElementById('player-name-input').value || "Guest";
  document.getElementById('online-status').innerText = "Joining...";
  const undoBtn = document.getElementById('btnUndo');
  undoBtn.innerText = "Undo";
  undoBtn.disabled = false;
  try {
    google.script.run
      .withSuccessHandler(res => {
        if (!res || !res.success) {
           document.getElementById('online-status').innerText = "Room not found.";
           return;
        }
        closeWelcomeScreen();
        roomId = id;
        gameMode = 'online';
        const state = res.data;
        playerColor = res.role === 'spectator' ? 'w' : res.role;
        playerRole = res.role;
        boardFlipped = (playerColor === 'b');
        if (playerRole === 'spectator') {
          const badge = document.getElementById('spectator-badge');
          if (badge) badge.classList.remove('hidden');
        }
        
        game.load(state.fen || 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');
        whiteTime = state.whiteTime;
        blackTime = state.blackTime;
        lastServerSync = state.lastMoveTimestamp;
        
        updateBoard();
        const infoEl = document.getElementById('game-info-panel');
        if (infoEl) infoEl.innerText = "Room Code: " + roomId;
        startPolling();
      })
      .withFailureHandler(e => {
        document.getElementById('online-status').innerText = "Server Error: Failed to join room.";
      })
      .getGameState(id, pName);
  } catch(e) {
    document.getElementById('online-status').innerText = "Error: Network error detected.";
  }
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollRetryCount = 0;
  backoffDelay = 1000;

  const poll = () => {
    if (gameMode !== 'online' || !roomId) return;
    
    google.script.run
      .withSuccessHandler(res => {
        if (!res || !res.success) {
          handlePollError();
          return;
        }
        
        // Reset backoff on success
        pollRetryCount = 0;
        backoffDelay = 1000;
        setConnectionStatus('green');

        const state = res.data;
        isGamePaused = !!state.isPaused;
        
        // --- OPPONENT OFFLINE BANNER ---
        const banner = document.getElementById('opponent-offline-banner');
        if (isGamePaused) banner.classList.remove('hidden');
        else banner.classList.add('hidden');

        // AUTHORITATIVE SYNC (Check for drift)
        if (state.whiteTime !== null && state.blackTime !== null) {
          const wDelta = Math.abs(state.whiteTime - whiteTime);
          const bDelta = Math.abs(state.blackTime - blackTime);
          if (wDelta > 1000 || bDelta > 1000) {
            whiteTime = state.whiteTime;
            blackTime = state.blackTime;
          }
          lastServerSync = state.lastMoveTimestamp;
        }

        const tbToast = document.getElementById('takeback-toast');
        const drToast = document.getElementById('draw-toast');
        const isTakebackActive = !!state.takebackRequest;

        // Waiting overlay logic
        const waitingOverlay = document.getElementById('waiting-overlay');
        if (waitingOverlay) {
            if (!state.blackPlayer) {
               waitingOverlay.classList.remove('hidden');
               document.getElementById('waiting-code-display').innerText = roomId;
               isGamePaused = true;
            } else {
               waitingOverlay.classList.add('hidden');
            }
        }

        // Takeback sync
        if (state.takebackRequest && state.takebackRequest !== playerColor && playerRole !== 'spectator') {
          tbToast.classList.remove('hidden');
        } else {
          tbToast.classList.add('hidden');
        }

        // Draw sync
        if (state.drawOffer && state.drawOffer !== playerColor && playerRole !== 'spectator') {
          drToast.classList.remove('hidden');
        } else {
          drToast.classList.add('hidden');
        }

        // Game Over sync
        if (state.gameOver) {
          tbToast.classList.add('hidden');
          drToast.classList.add('hidden');
          handleRemoteGameOver(state.gameOver);
          return;
        }

        if (state.fen !== game.fen()) {
          const currentHistory = game.history();
          const serverHistory = new Chess(state.fen).history();

          if (isWaitingForServer && serverHistory.length < currentHistory.length) {
             // Do nothing. Wait for server to catch up. Polling will continue below.
          } else {
            if (serverHistory.length >= currentHistory.length) {
               isWaitingForServer = false;
            }

            const isTakebackDetected = serverHistory.length < currentHistory.length && !isWaitingForServer;

            game.load(state.fen);

            if (isTakebackDetected) {
              pendingPremove = null;
              boardEl.querySelectorAll('.square.premove').forEach(s => s.classList.remove('premove'));
              clearHighlights();
              const undoBtn = document.getElementById('btnUndo');
              if (undoBtn && undoBtn.innerText === "Proposing...") {
                undoBtn.innerText = "Undo";
                undoBtn.disabled = false;
              }
            }

            updateBoard();
            const lastMove = game.history({verbose:true}).pop();
            if (lastMove) {
              // Force resume audio context on move detection
              AudioController.init();
              
              const isCapture = lastMove.flags.includes('c') || lastMove.flags.includes('e');
              if (game.in_check()) AudioController.play('check');
              else if (isCapture) AudioController.play('capture');
              else AudioController.play('move');
            }

            if (pendingPremove && game.turn() === playerColor && !isTakebackActive && playerRole !== 'spectator') {
              const pm = game.move({ from: pendingPremove.from, to: pendingPremove.to, promotion: 'q' });
              if (pm) {
                isWaitingForServer = true;
                google.script.run
                  .withSuccessHandler(res => { 
                     isWaitingForServer = false;
                     if (res && !res.success) errorCallback(res.error); 
                  })
                  .withFailureHandler(err => {
                     isWaitingForServer = false;
                     errorCallback(err);
                  })
                  .makeMove(roomId, game.fen(), game.game_over(), game.history().length, playerColor);
                updateBoard();
                const isPMCapture = pm.flags.includes('c') || pm.flags.includes('e');                if (game.in_check()) AudioController.play('check');
                else if (isPMCapture) AudioController.play('capture');
                else AudioController.play('move');
              }
              pendingPremove = null;
            }
          }
        }
        pollInterval = setTimeout(poll, 1200);
        })
        .withFailureHandler(() => {
        handlePollError();
        })
        .getGameState(roomId, playerName);
        };

        const handlePollError = () => {
        pollRetryCount++;
        if (pollRetryCount > 3) {
        setConnectionStatus('yellow'); // Shows the infinite "Reconnecting..." overlay only after 3 tries
        }

        backoffDelay = Math.min(5000, backoffDelay * 2); // Cap at 5s, infinite retries
        pollInterval = setTimeout(poll, backoffDelay);
        };
  pollInterval = setTimeout(poll, 1000);
}

function handleRemoteGameOver(gameOver) {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
  AudioController.play('gameEnd');
  document.getElementById('game-info-panel').innerText = `${gameOver.result} (${gameOver.reason})`;
  document.getElementById('btnReview').classList.remove('hidden');
  
  const overlay = document.createElement('div');
  overlay.className = 'game-over-overlay';
  overlay.innerHTML = `
    <div class="overlay-content">
      <h2 style="margin:0">${gameOver.result}</h2>
      <p style="margin:5px 0 0; opacity:0.8">${gameOver.reason}</p>
    </div>
  `;
  boardEl.style.position = 'relative';
  boardEl.appendChild(overlay);
}

// --- BOARD LOGIC ---
let secretThemeClicks = 0;
let lastSecretClickTime = 0;

function initBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const square = document.createElement('div');
      const sqName = String.fromCharCode(97 + c) + (8 - r);
      square.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
      square.dataset.row = r;
      square.dataset.col = c;
      square.dataset.square = sqName;
      square.setAttribute('aria-label', sqName);
      
      if (sqName === 'a8') {
        square.addEventListener('mousedown', () => {
           const now = Date.now();
           if (now - lastSecretClickTime < 1000) secretThemeClicks++;
           else secretThemeClicks = 1;
           lastSecretClickTime = now;
           if (secretThemeClicks >= 3) {
             const current = document.body.getAttribute('data-theme');
             document.body.setAttribute('data-theme', current === 'cyberpunk' ? '' : 'cyberpunk');
             secretThemeClicks = 0;
           }
        });
      }
      
      if (c === 0) {
        const rank = document.createElement('div');
        rank.className = 'coord rank';
        rank.innerText = 8 - r;
        square.appendChild(rank);
      }
      if (r === 7) {
        const file = document.createElement('div');
        file.className = 'coord file';
        file.innerText = String.fromCharCode(97 + c);
        square.appendChild(file);
      }
      
      square.addEventListener('mousedown', handleSquareClick);
      square.addEventListener('dragover', e => e.preventDefault());
      square.addEventListener('drop', handleDrop);
      boardEl.appendChild(square);
    }
  }
}

function updateMoveList() {
  const hist = game.history();
  let html = '';
  
  const icons = { 
    brilliant: '!!', 
    great: '!', 
    best: '★', 
    excellent: '✓', 
    good: '✓', 
    book: '📖', 
    inaccuracy: '?!', 
    mistake: '?', 
    blunder: '??' 
  };

  for (let i = 0; i < hist.length; i += 2) {
    const wIdx = i;
    const bIdx = i + 1;
    
    let wMarker = '';
    let bMarker = '';
    
    if (gameMode === 'analysis' && fullGameAnalysis.length > 0) {
      if (fullGameAnalysis[wIdx]) {
        const cls = fullGameAnalysis[wIdx].classification.toLowerCase();
        wMarker = `<span class="move-marker marker-${cls}" title="${cls}"></span>`;
      }
      if (fullGameAnalysis[bIdx]) {
        const cls = fullGameAnalysis[bIdx].classification.toLowerCase();
        bMarker = `<span class="move-marker marker-${cls}" title="${cls}"></span>`;
      }
    }

    html += `<div class="move-row" style="display:grid; grid-template-columns:35px 1fr 1fr; padding:4px 0; border-bottom:1px solid #333;">
               <span style="color:#666; font-weight:bold; display:flex; align-items:center; justify-content:center;">${Math.floor(i/2)+1}</span>
               <span class="move-val" onclick="goToAnalysisStep(${wIdx})">
                 <span>${hist[wIdx]}</span>
                 ${wMarker}
               </span>
               <span class="move-val" onclick="goToAnalysisStep(${bIdx})">
                 <span>${hist[bIdx]||''}</span>
                 ${bMarker}
               </span>
             </div>`;
  }
  if (moveListEl) {
    moveListEl.innerHTML = html;
    moveListEl.scrollTop = moveListEl.scrollHeight;
  }
}

function updateBoard() {
  if (!boardEl) {
    boardEl = document.getElementById('board');
    if (!boardEl) return;
  }
  
  const b = game.board();
  const squares = boardEl.querySelectorAll('.square');
  if (!squares || squares.length === 0) return;

  boardEl.style.transform = boardFlipped ? 'rotate(180deg)' : '';
  
  // Highlighting the last move
  const history = game.history({ verbose: true });
  const lastMove = history.length > 0 ? history[history.length - 1] : null;

  squares.forEach(sq => {
    const rowIdx = sq.dataset.row;
    const colIdx = sq.dataset.col;
    if (rowIdx === undefined || colIdx === undefined) return;
    
    const r = parseInt(rowIdx);
    const c = parseInt(colIdx);
    const piece = b[r][c];
    let existingPiece = sq.querySelector('.piece');
    
    if (piece) {
      if (!existingPiece) {
        existingPiece = document.createElement('div');
        existingPiece.draggable = true;
        existingPiece.addEventListener('dragstart', handleDragStart);
        sq.appendChild(existingPiece);
      }
      const targetClass = `piece ${piece.color}${piece.type.toUpperCase()}`;
      if (existingPiece.className !== targetClass) {
        existingPiece.className = targetClass;
        const imgKey = piece.color + piece.type.toUpperCase();
        existingPiece.style.backgroundImage = pieceImages[imgKey] ? `linear-gradient(transparent, transparent), url("${pieceImages[imgKey]}")` : 'none';
      }
      existingPiece.dataset.square = sq.dataset.square;
      existingPiece.style.transform = boardFlipped ? 'rotate(180deg)' : '';
    } else if (existingPiece) {
      existingPiece.remove();
    }

    sq.classList.remove('highlight', 'legal-move', 'in-check', 'premove');
    
    // Highlight last move squares
    if (lastMove && (sq.dataset.square === lastMove.from || sq.dataset.square === lastMove.to)) {
      sq.classList.add('highlight');
    }

    if (pendingPremove && (sq.dataset.square === pendingPremove.from || sq.dataset.square === pendingPremove.to)) {
      sq.classList.add('premove');
    }
  });

  if (game.in_check()) {
    const kColor = game.turn();
    squares.forEach(sq => {
      const r = parseInt(sq.dataset.row);
      const c = parseInt(sq.dataset.col);
      const p = b[r] ? b[r][c] : null;
      if (p && p.type === 'k' && p.color === kColor) sq.classList.add('in-check');
    });
  }

  const isOver = game.game_over();
  const btnReview = document.getElementById('btnReview');
  if (btnReview) btnReview.classList.toggle('hidden', !isOver);
  
  const controls = ['btnUndo', 'btnDraw', 'btnResign'];
  controls.forEach(id => {
    const el = document.getElementById(id);
    if(el) {
      if (isOver || playerRole === 'spectator') el.classList.add('hidden');
      else {
        el.classList.remove('hidden');
        if (id === 'btnUndo') { el.disabled = game.history().length === 0; el.style.opacity = el.disabled ? '0.5' : '1'; }
      }
    }
  });

  updateMoveList();
  if (gameMode !== 'online' && gameMode !== 'analysis' && gameMode !== 'idle') {
    triggerEvaluation();
  }
}

// --- INTERACTION ---
function handleSquareClick(e) {
  if (e.button === 2) return; 
  e.stopPropagation();
  clearSVG();
  
  if (gameMode === 'analysis' || playerRole === 'spectator') return;
  if ((connectionStatus !== 'green' || isGamePaused) && gameMode === 'online') return;
  
  const sq = e.currentTarget.dataset.square;
  const p = game.get(sq);
  const isOpponentTurn = (gameMode === 'online' && game.turn() !== playerColor);

  // Clear premove if clicking any square while one exists
  if (pendingPremove) {
    pendingPremove = null;
    updateBoard();
    return;
  }

  if (isOpponentTurn) {
    if (!premoveToggle || !premoveToggle.checked) return;
    
    if (selectedSquare) {
      if (selectedSquare === sq) {
        selectedSquare = null;
      } else {
        pendingPremove = { from: selectedSquare, to: sq };
        selectedSquare = null;
      }
      updateBoard();
    } else {
      if (p && p.color === playerColor) {
        selectedSquare = sq;
        highlightSquare(sq);
      }
    }
    return;
  }

  // Normal turn logic
  if (selectedSquare) {
    attemptMove(selectedSquare, sq);
    selectedSquare = null;
    clearHighlights();
  } else {
    if (p && p.color === game.turn()) {
      selectedSquare = sq;
      highlightSquare(sq);
      highlightLegalMoves(sq);
    }
  }
}

function handleDragStart(e) {
  if (gameMode === 'analysis' || playerRole === 'spectator') { e.preventDefault(); return; }
  
  if ((connectionStatus !== 'green' || isGamePaused) && gameMode === 'online') {
    e.preventDefault();
    return;
  }

  const sq = e.target.dataset.square;
  const p = game.get(sq);
  const isOpponentTurn = (gameMode === 'online' && game.turn() !== playerColor);

  if (isOpponentTurn) {
    if (!premoveToggle || !premoveToggle.checked || (p && p.color !== playerColor)) {
      e.preventDefault();
      return;
    }
  } else {
    pendingPremove = null;
    if (p && p.color !== game.turn()) {
      e.preventDefault();
      return;
    }
  }
  
  selectedSquare = sq;
  e.dataTransfer.setData('text/plain', selectedSquare);
  // Clear SVG immediately on drag to prevent visual clutter
  clearSVG();
}

function handleDrop(e) {
  e.preventDefault();
  if (playerRole === 'spectator') return;
  const from = e.dataTransfer.getData('text/plain');
  let target = e.target;
  if (target.classList.contains('piece')) target = target.parentElement;
  const to = target.dataset.square;
  
  const isOpponentTurn = (gameMode === 'online' && game.turn() !== playerColor);
  if (isOpponentTurn && premoveToggle.checked) {
    pendingPremove = { from, to };
    updateBoard();
    return;
  }

  if (from && to) attemptMove(from, to);
  selectedSquare = null;
  clearHighlights();
}

function attemptMove(from, to, promo = null) {
  document.getElementById('takeback-toast').classList.add('hidden');
  const drToast = document.getElementById('draw-toast');
  if (!drToast.classList.contains('hidden')) {
    drToast.classList.add('hidden');
    if (gameMode === 'online') google.script.run.resolveDraw(roomId, false);
  }
  
  if (gameMode !== 'local' && game.turn() !== playerColor) return;

  const moves = game.moves({ verbose: true });
  const move = moves.find(m => m.from === from && m.to === to);
  
  if (move) {
    if (move.flags.includes('p') && !promo) {
      pendingMove = { from, to };
      showPromotionDialog();
      return;
    }
    
    previousFen = game.fen();
    game.move({ from, to, promotion: promo || 'q' });
    
    const isCapture = move.flags.includes('c') || move.flags.includes('e');
    if (game.in_check()) AudioController.play('check');
    else if (isCapture) AudioController.play('capture');
    else AudioController.play('move');
    
    updateBoard();
    
    if (gameMode === 'online') {
      isWaitingForServer = true;
      google.script.run
        .withSuccessHandler(res => { 
           isWaitingForServer = false;
           if (res && !res.success) errorCallback(res.error); 
        })
        .withFailureHandler((err) => {
           isWaitingForServer = false;
           errorCallback(err);
        })
        .makeMove(roomId, game.fen(), game.game_over(), game.history().length, playerColor);
    } else if (gameMode === 'ai' && !game.game_over()) {
      setTimeout(makeAIMove, 250);
    } else if (gameMode === 'puzzle' && typeof handlePuzzleMove === 'function') {
      handlePuzzleMove(move);
    }
    if (game.game_over()) AudioController.play('gameEnd');
  } else {
    const fromEl = boardEl.querySelector(`[data-square="${from}"] .piece`);
    if (fromEl) { fromEl.classList.add('shake'); setTimeout(() => fromEl.classList.remove('shake'), 400); }
  }
  selectedSquare = null;
  clearHighlights();
}

// [Helper Functions for SVG, UI, Promotion, AI...]
function getSquareCenter(sq) {
  const el = boardEl.querySelector(`[data-square="${sq}"]`);
  if (!el) return { x: 0, y: 0 };
  const rect = el.getBoundingClientRect();
  const boardRect = boardEl.getBoundingClientRect();
  return { x: (rect.left - boardRect.left) + rect.width / 2, y: (rect.top - boardRect.top) + rect.height / 2 };
}
function drawCircle(sq) {
  const center = getSquareCenter(sq);
  const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  circle.setAttribute("cx", center.x); circle.setAttribute("cy", center.y); circle.setAttribute("r", "40%");
  circle.setAttribute("fill", "none"); circle.setAttribute("stroke", "#f23c32"); circle.setAttribute("stroke-width", "4"); circle.setAttribute("opacity", "0.7");
  svgLayer.appendChild(circle);
}
function drawArrow(from, to) {
  const start = getSquareCenter(from); const end = getSquareCenter(to);
  const dx = end.x - start.x; const dy = end.y - start.y; const angle = Math.atan2(dy, dx); const length = Math.sqrt(dx*dx + dy*dy);
  const backOff = 15; const endX = start.x + Math.cos(angle) * (length - backOff); const endY = start.y + Math.sin(angle) * (length - backOff);
  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
  line.setAttribute("x1", start.x); line.setAttribute("y1", start.y); line.setAttribute("x2", endX); line.setAttribute("y2", endY);
  line.setAttribute("stroke", "#f23c32"); line.setAttribute("stroke-width", "8"); line.setAttribute("opacity", "0.7"); line.setAttribute("marker-end", "url(#arrowhead)");
  svgLayer.appendChild(line);
}
function clearSVG() { svgLayer.innerHTML = ''; }
function highlightSquare(sq) { const el = boardEl.querySelector(`[data-square="${sq}"]`); if (el) el.classList.add('highlight'); }
function clearHighlights() { boardEl.querySelectorAll('.square').forEach(sq => sq.classList.remove('highlight', 'legal-move')); }
function highlightLegalMoves(sq) { game.moves({ square: sq, verbose: true }).forEach(m => { const el = boardEl.querySelector(`[data-square="${m.to}"]`); if (el) el.classList.add('legal-move'); }); }
function showPromotionDialog() { promoDialog.classList.remove('hidden'); }
function makeAIMove() { 
  if (gameMode !== 'ai' || game.game_over()) return; 
  
  // Map difficulty slider (1-4) to Stockfish depth (4, 8, 12, 16)
  const depth = aiDepth * 4;
  
  enginePool.evaluate(game.fen(), depth, 'ai_move', (cp, mate, taskId, bestMove) => {
    if (gameMode !== 'ai' || game.game_over()) return;
    
    if (bestMove) {
      const moveResult = game.move(bestMove, { sloppy: true });
      updateBoard();
      
      const isCapture = moveResult.flags.includes('c') || moveResult.flags.includes('e');
      if (game.in_check()) AudioController.play('check');
      else if (isCapture) AudioController.play('capture');
      else AudioController.play('move');
    }
  });
}
function showLeaderboard() {
  showMenu('menu-leaderboard');
  google.script.run.withSuccessHandler(players => {
    document.getElementById('leaderboard-body').innerHTML = players.map((p, i) => `<tr><td>#${i+1}</td><td>${p.name}</td><td>${p.elo}</td><td>${p.wins}/${p.losses}/${p.draws}</td></tr>`).join('');
  }).getLeaderboard();
}

function triggerEvaluation(depth = 10) {
  if (gameMode === 'online') return;
  if (evalDebounceTimeout) clearTimeout(evalDebounceTimeout);
  evalDebounceTimeout = setTimeout(() => {
    enginePool.evaluate(game.fen(), depth, 'live', (cp, mate) => {
      updateEvalBar(cp, mate);
    });
  }, 250);
}
let evalDebounceTimeout = null;
function updateEvalBar(cp, mate) {
  const fillEl = document.getElementById('eval-bar-fill'); const textEl = document.getElementById('eval-bar-text');
  if (!fillEl || !textEl) return;
  let absCp = (game.turn() === 'b' ? -cp : cp); let absMate = (mate !== null && game.turn() === 'b' ? -mate : mate);
  let percentage = absMate !== null ? (absMate > 0 ? 100 : 0) : 100 / (1 + Math.exp(-absCp / 200));
  fillEl.style.height = (boardFlipped ? 100 - percentage : percentage) + '%';
  textEl.innerText = absMate !== null ? 'M' + Math.abs(absMate) : (Math.abs(absCp) / 100).toFixed(1);
  textEl.className = 'eval-bar-text ' + (percentage > 50 ? (boardFlipped ? 'top' : 'bottom') : (boardFlipped ? 'bottom' : 'top'));
}

let analysisHistory = []; let analysisIndex = -1; let fullGameAnalysis = [];
async function startAnalysisMode() {
  gameMode = 'analysis'; analysisHistory = game.history({ verbose: true }); analysisIndex = analysisHistory.length - 1;
  document.getElementById('main-controls').classList.add('hidden'); document.getElementById('analysis-controls').classList.remove('hidden');
  document.getElementById('game-info-panel').innerText = "Analyzing Game..."; document.getElementById('analysis-report').classList.remove('hidden');
  document.getElementById('white-elo').innerText = "---"; document.getElementById('black-elo').innerText = "---";
  const startTime = performance.now(); await runFullGameAnalysis(); const endTime = performance.now();
  document.getElementById('execution-time').innerText = Math.round(endTime - startTime); document.getElementById('thread-count').innerText = enginePool.poolSize;
  updateBoard(); triggerEvaluation(16);
}
async function runFullGameAnalysis() {
  fullGameAnalysis = []; 
  const history = game.history({ verbose: true }); 
  const tempGame = new Chess(); 
  const fens = [tempGame.fen()];
  
  for (let m of history) { 
    tempGame.move(m); 
    fens.push(tempGame.fen()); 
  }
  
  const evalPromises = fens.map((f, i) => new Promise(resolve => {
      const timeout = setTimeout(() => resolve({ cp: 0, mate: null }), 5000); // 5s fallback
      enginePool.evaluate(f, 12, `batch_${i}`, (cp, mate) => {
        clearTimeout(timeout);
        resolve({ cp, mate });
      });
  }));
  
  const evals = await Promise.all(evalPromises);
  let wCPLs = []; 
  let bCPLs = []; 
  let tallies = { brilliant: 0, great: 0, best: 0, excellent: 0, good: 0, inaccuracy: 0, mistake: 0, blunder: 0, book: 0 };
  
  for (let i = 0; i < history.length; i++) {
    const prev = evals[i]; 
    const curr = evals[i+1]; 
    const turn = i % 2 === 0 ? 'w' : 'b';
    
    let pVal = prev.cp; if (prev.mate !== null) pVal = prev.mate > 0 ? 10000 : -10000;
    let cVal = curr.cp; if (curr.mate !== null) cVal = curr.mate > 0 ? 10000 : -10000;
    
    let cpl = Math.max(0, turn === 'w' ? (pVal - cVal) : (cVal - pVal));
    let cls = "Good"; 

    // CHESS.COM CLASSIFICATION LOGIC
    if (i < 8 && cpl < 30) cls = "Book";
    else if (cpl < 8) cls = "Best";
    else if (cpl < 15) cls = "Excellent";
    else if (cpl < 30) cls = "Good";
    else if (cpl < 60) cls = "Inaccuracy";
    else if (cpl < 180) cls = "Mistake";
    else cls = "Blunder";

    // Detect Brilliant/Great
    if (cls === "Best" && Math.abs(cVal) > 200 && cpl < 2) {
       if (history[i].captured || history[i].san.includes('x')) cls = "Brilliant";
       else cls = "Great";
    }
    
    if (turn === 'w') wCPLs.push(cpl); else bCPLs.push(cpl);
    tallies[cls.toLowerCase()]++;
    fullGameAnalysis.push({ move: history[i], eval: curr, cpl: cpl, classification: cls });
  }
  displayAnalysisReport(wCPLs, bCPLs, tallies);
  const infoEl = document.getElementById('game-info-panel');
  if (infoEl) infoEl.innerText = "Analysis Mode";
}

function displayAnalysisReport(w, b, t) {
  const acplW = w.reduce((a,x)=>a+x,0)/(w.length||1); const acplB = b.reduce((a,x)=>a+x,0)/(b.length||1);
  const accW = Math.round(Math.max(0, 100 - acplW/2)); const accB = Math.round(Math.max(0, 100 - acplB/2));
  document.getElementById('white-elo').innerText = Math.max(400, Math.min(3000, Math.round(2900 - acplW*22)));
  document.getElementById('black-elo').innerText = Math.max(400, Math.min(3000, Math.round(2900 - acplB*22)));
  document.getElementById('white-acc').innerText = accW + "%"; document.getElementById('black-acc').innerText = accB + "%";
  document.getElementById('white-acc-ring').style.strokeDashoffset = 226 - (226*accW)/100;
  document.getElementById('black-acc-ring').style.strokeDashoffset = 226 - (226*accB)/100;
  
  const items = [
    {l:'Brilliant',k:'brilliant',c:'var(--color-brilliant)', i:'!!'},
    {l:'Great',k:'great',c:'var(--color-great)', i:'!'},
    {l:'Best',k:'best',c:'var(--color-best)', i:'★'},
    {l:'Excellent',k:'excellent',c:'var(--color-excellent)', i:'✓'},
    {l:'Good',k:'good',c:'var(--color-good)', i:'✓'},
    {l:'Book',k:'book',c:'var(--color-book)', i:'📖'},
    {l:'Inaccuracy',k:'inaccuracy',c:'var(--color-inaccuracy)', i:'?!'},
    {l:'Mistake',k:'mistake',c:'var(--color-mistake)', i:'?'},
    {l:'Blunder',k:'blunder',c:'var(--color-blunder)', i:'??'}
  ];
  
  document.getElementById('move-tally').innerHTML = items.map(i => `
    <div class="tally-item" style="border-left: 3px solid ${i.c}">
      <span style="display:flex; align-items:center; gap:5px;"><small style="opacity:0.7">${i.i}</small> ${i.l}</span>
      <b>${t[i.k]||0}</b>
    </div>
  `).join('');
}
function exitAnalysisMode() { document.getElementById('analysis-controls').classList.add('hidden'); document.getElementById('analysis-report').classList.add('hidden'); document.getElementById('main-controls').classList.remove('hidden'); openWelcomeScreen(); }
function goToAnalysisStep(index) {
  if (index < -1 || index >= analysisHistory.length) return;
  analysisIndex = index; game.reset(); for (let i = 0; i <= index; i++) game.move(analysisHistory[i]);
  updateBoard();
  if (index >= 0 && fullGameAnalysis[index]) {
    const m = fullGameAnalysis[index].move; const cls = fullGameAnalysis[index].classification.toLowerCase();
    const toSq = boardEl.querySelector(`[data-square="${m.to}"]`);
    if (toSq) {
      const icons = { 
        brilliant: '!!', 
        great: '!', 
        best: '★', 
        excellent: '✓', 
        good: '✓', 
        book: '📖', 
        inaccuracy: '?!', 
        mistake: '?', 
        blunder: '??' 
      };
      const badge = document.createElement('div'); 
      badge.className = `badge badge-${cls} square-badge`; 
      badge.innerText = icons[cls] || ''; 
      toSq.appendChild(badge);
    }
  }
  triggerEvaluation(16);
}

document.addEventListener('DOMContentLoaded', () => { 
  console.log("DOM fully loaded and parsed");
  
  boardEl = document.getElementById('board');
  moveListEl = document.getElementById('move-list');
  promoDialog = document.getElementById('promotion-dialog');
  premoveToggle = document.getElementById('premove-toggle');
  svgLayer = document.getElementById('svg-draw-layer');

  if (boardEl) {
    initBoard(); 
    boardEl.addEventListener('dblclick', function(e) { e.preventDefault(); }, { passive: false });
    
    // Right-Click Arrow Drawing
    boardEl.addEventListener('contextmenu', e => e.preventDefault());
    boardEl.addEventListener('mousedown', e => {
      if (e.button === 2) {
        isRightClickDragging = true;
        rightClickStartSq = getSquareFromEvent(e);
      } else if (e.button === 0) {
        clearSVG();
      }
    });
    
    boardEl.addEventListener('mouseup', e => {
      if (e.button === 2 && isRightClickDragging) {
        isRightClickDragging = false;
        const endSq = getSquareFromEvent(e);
        if (rightClickStartSq && endSq && rightClickStartSq !== endSq) {
          drawArrow(rightClickStartSq, endSq);
        } else if (rightClickStartSq === endSq) {
          drawCircle(rightClickStartSq);
        }
        rightClickStartSq = null;
      }
    });
  } else {
    console.error("CRITICAL: Board element NOT FOUND on init!");
  }
  
  const ws = document.getElementById('welcome-screen');
  if (ws) {
    ws.style.setProperty('display', 'flex', 'important');
    ws.classList.remove('hidden');
  }
  
  // Mute toggle
  const muteBtn = document.getElementById('mute-toggle');
  if (muteBtn) {
    muteBtn.addEventListener('click', function() {
      AudioController.muted = !AudioController.muted;
      this.innerText = AudioController.muted ? '🔇' : '🔊';
    });
  }
});

function getSquareFromEvent(e) {
  const rect = boardEl.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const col = Math.floor((x / rect.width) * 8);
  const row = Math.floor((y / rect.height) * 8);
  if (col < 0 || col > 7 || row < 0 || row > 7) return null;
  const c = boardFlipped ? (7 - col) : col;
  const r = boardFlipped ? (7 - row) : row;
  return String.fromCharCode(97 + c) + (8 - r);
}
