<script>
// Game State
let game = new Chess();
let boardFlipped = false;
let showCoords = true;
let showHints = false;

// Multiplayer & Mode State
let gameMode = 'local'; // 'local', 'ai', 'online'
let playerColor = 'w';
let roomId = null;
let pollInterval = null;
let aiDepth = 2;

// DOM Elements
const boardEl = document.getElementById('board');
const moveListEl = document.getElementById('move-list');
const promoDialog = document.getElementById('promotion-dialog');
let pendingMove = null;
let selectedSquare = null;

// --- WELCOME SCREEN LOGIC ---

function showMenu(id) {
  document.querySelectorAll('.menu-section').forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function closeWelcomeScreen() {
  document.getElementById('welcome-screen').classList.add('hidden');
  document.getElementById('main-app').style.filter = 'none';
  document.getElementById('main-app').style.pointerEvents = 'auto';
}

function openWelcomeScreen() {
  if (pollInterval) clearInterval(pollInterval);
  document.getElementById('welcome-screen').classList.remove('hidden');
  document.getElementById('main-app').style.filter = 'blur(5px)';
  document.getElementById('main-app').style.pointerEvents = 'none';
  showMenu('menu-main');
  roomId = null;
}

function startLocalMultiplayer() {
  gameMode = 'local';
  game.reset();
  boardFlipped = false;
  updateBoard();
  document.getElementById('game-info-panel').innerText = "Local Pass & Play";
  closeWelcomeScreen();
}

function startAIGame(color) {
  gameMode = 'ai';
  playerColor = color;
  aiDepth = parseInt(document.getElementById('ai-diff-slider').value);
  game.reset();
  boardFlipped = (color === 'b');
  updateBoard();
  document.getElementById('game-info-panel').innerText = "Playing vs Computer";
  closeWelcomeScreen();
  if (color === 'b') setTimeout(makeAIMove, 250);
}

function createOnlineRoom() {
  document.getElementById('online-status').innerText = "Creating room...";
  try {
    google.script.run.withSuccessHandler(id => {
      roomId = id;
      gameMode = 'online';
      playerColor = 'w';
      boardFlipped = false;
      game.reset();
      updateBoard();
      document.getElementById('game-info-panel').innerText = "Room Code: " + roomId;
      closeWelcomeScreen();
      startPolling();
    }).createRoom();
  } catch(e) {
    document.getElementById('online-status').innerText = "Error: Network / Apps Script not detected.";
  }
}

function joinOnlineRoom() {
  const id = document.getElementById('room-code-input').value.toUpperCase();
  if(id.length !== 4) return;
  document.getElementById('online-status').innerText = "Joining...";
  try {
    google.script.run.withSuccessHandler(state => {
      if (state === null) {
         document.getElementById('online-status').innerText = "Room not found.";
         return;
      }
      roomId = id;
      gameMode = 'online';
      playerColor = 'b';
      boardFlipped = true;
      if (state) {
        if (state.indexOf('[') !== -1 || state.indexOf('1.') === 0) {
          game.load_pgn(state); // Fallback if old PGN format is returned
        } else {
          game.load(state); // Load FEN string
        }
      } else {
        game.reset();
      }
      updateBoard();
      document.getElementById('game-info-panel').innerText = "Room Code: " + roomId;
      closeWelcomeScreen();
      startPolling();
    }).getGameState(id);
  } catch(e) {
    document.getElementById('online-status').innerText = "Error: Network / Apps Script not detected.";
  }
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(() => {
    if (gameMode !== 'online' || !roomId) return;
    try {
      google.script.run.withSuccessHandler(state => {
        if (state !== null && state !== game.fen() && state !== game.pgn()) {
          if (state.indexOf('[') !== -1 || state.indexOf('1.') === 0) {
            game.load_pgn(state);
          } else {
            game.load(state);
          }
          updateBoard();
          playSound('move');
        }
      }).getGameState(roomId);
    } catch(e){}
  }, 1000);
}

// --- BOARD LOGIC (OPTIMIZED DOM UPDATES) ---

function initBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const square = document.createElement('div');
      square.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
      square.dataset.row = r;
      square.dataset.col = c;
      square.dataset.square = String.fromCharCode(97 + c) + (8 - r);
      square.setAttribute('aria-label', square.dataset.square);
      
      if (c === 0) {
        const rank = document.createElement('span');
        rank.className = 'coord rank';
        rank.innerText = 8 - r;
        square.appendChild(rank);
      }
      if (r === 7) {
        const file = document.createElement('span');
        file.className = 'coord file';
        file.innerText = String.fromCharCode(97 + c);
        square.appendChild(file);
      }
      
      square.addEventListener('click', handleSquareClick);
      square.addEventListener('dragover', e => e.preventDefault());
      square.addEventListener('drop', handleDrop);
      
      boardEl.appendChild(square);
    }
  }
  updateBoard();
}

function updateBoard() {
  const b = game.board();
  const squares = boardEl.querySelectorAll('.square');
  
  boardEl.style.transform = boardFlipped ? 'rotate(180deg)' : '';
  
  squares.forEach(sq => {
    const r = parseInt(sq.dataset.row);
    const c = parseInt(sq.dataset.col);
    const piece = b[r][c];
    
    let existingPiece = sq.querySelector('.piece');
    let targetClass = piece ? `piece ${piece.color}${piece.type.toUpperCase()}` : '';
    
    if (piece) {
      if (!existingPiece) {
        existingPiece = document.createElement('div');
        existingPiece.draggable = true;
        existingPiece.addEventListener('dragstart', handleDragStart);
        sq.appendChild(existingPiece);
      }
      if (existingPiece.className !== targetClass) {
        existingPiece.className = targetClass;
        const imgKey = piece.color + piece.type.toUpperCase();
        existingPiece.style.backgroundImage = pieceImages[imgKey] ? `url("${pieceImages[imgKey]}")` : 'none';
      }
      existingPiece.dataset.square = sq.dataset.square;
      existingPiece.style.transform = boardFlipped ? 'rotate(180deg)' : '';
    } else {
      if (existingPiece) existingPiece.remove();
    }
    
    const coords = sq.querySelectorAll('.coord');
    coords.forEach(coord => {
      coord.style.transform = boardFlipped ? 'rotate(180deg)' : '';
      coord.style.display = showCoords ? 'block' : 'none';
    });

    sq.classList.remove('highlight', 'last-move', 'in-check');
    sq.classList.remove('anno-best', 'anno-good', 'anno-inaccuracy', 'anno-mistake', 'anno-blunder');
    const oldTag = sq.querySelector('.move-classification-tag');
    if (oldTag) oldTag.remove();
  });

  if (game.in_check()) {
    const kColor = game.turn();
    squares.forEach(sq => {
      const r = parseInt(sq.dataset.row);
      const c = parseInt(sq.dataset.col);
      const p = b[r][c];
      if (p && p.type === 'k' && p.color === kColor) {
        sq.classList.add('in-check');
      }
    });
  }

  if (game.game_over()) {
    document.getElementById('btnReview').classList.remove('hidden');
    document.getElementById('btnUndo').classList.add('hidden');
  } else {
    document.getElementById('btnReview').classList.add('hidden');
    if (gameMode !== 'analysis') document.getElementById('btnUndo').classList.remove('hidden');
  }

  updateMoveList();
  if (gameMode !== 'online' && gameMode !== 'analysis' && gameMode !== 'idle') {
    triggerEvaluation();
  }
}

// --- INTERACTION ---

function handleSquareClick(e) {
  if (gameMode === 'analysis') return;
  if (gameMode !== 'local' && game.turn() !== playerColor) return;
  
  const sq = e.currentTarget.dataset.square;
  if (selectedSquare) {
    attemptMove(selectedSquare, sq);
    selectedSquare = null;
    clearHighlights();
  } else {
    const p = game.get(sq);
    if (p && p.color === game.turn()) {
      selectedSquare = sq;
      highlightSquare(sq);
      highlightLegalMoves(sq);
    }
  }
}

function handleDragStart(e) {
  if (gameMode === 'analysis') { e.preventDefault(); return; }
  if (gameMode !== 'local' && game.turn() !== playerColor) {
    e.preventDefault();
    return;
  }
  selectedSquare = e.target.dataset.square;
  e.dataTransfer.setData('text/plain', selectedSquare);
  highlightLegalMoves(selectedSquare);
}

function handleDrop(e) {
  e.preventDefault();
  const from = e.dataTransfer.getData('text/plain');
  let target = e.target;
  if (target.classList.contains('piece')) target = target.parentElement;
  const to = target.dataset.square;
  if (from && to) attemptMove(from, to);
  selectedSquare = null;
  clearHighlights();
}

let previousFen = null;

function errorCallback(error) {
  if (previousFen) {
    game.load(previousFen);
    updateBoard();
    alert("Network error: Move not saved. Reverting.");
  }
}

function attemptMove(from, to, promo = null) {
  if (gameMode !== 'local' && game.turn() !== playerColor) return;

  const moves = game.moves({ verbose: true });
  const move = moves.find(m => m.from === from && m.to === to);
  
  if (move) {
    if (move.flags.includes('p') && !promo) {
      pendingMove = { from, to };
      showPromotionDialog();
      return;
    }
    
    // Step 1 & 2: Local Validation and Optimistic Update
    previousFen = game.fen();
    game.move({ from, to, promotion: promo || 'q' });
    playSound('move');
    updateBoard();
    
    if (gameMode === 'online') {
      // Step 3: Async Sync with FEN
      const currentFen = game.fen();
      const isGameOver = game.game_over();
      const moveCount = game.history().length;
      try { 
        // Step 4: Rollback Handling
        google.script.run
          .withFailureHandler(errorCallback)
          .makeMove(roomId, currentFen, isGameOver, moveCount);
      } catch(e) {
        errorCallback(e);
      }
    } else if (gameMode === 'ai' && !game.game_over()) {
      setTimeout(makeAIMove, 250);
    } else if (gameMode === 'puzzle') {
      const uciMove = from + to + (promo || '');
      if (uciMove === puzzleSolution[currentPuzzleStep]) {
        currentPuzzleStep++;
        if (currentPuzzleStep >= puzzleSolution.length) {
          setTimeout(() => alert('Puzzle solved!'), 100);
        } else {
          // Play the opponent's response
          setTimeout(() => {
            const oppMove = puzzleSolution[currentPuzzleStep];
            game.move(oppMove, {sloppy: true});
            playSound('move');
            updateBoard();
            currentPuzzleStep++;
            if (currentPuzzleStep >= puzzleSolution.length) {
              setTimeout(() => alert('Puzzle solved!'), 100);
            }
          }, 500);
        }
      } else {
        setTimeout(() => alert('Incorrect move. Try again.'), 100);
        game.undo();
        updateBoard();
      }
    }

    if (game.game_over() && gameMode !== 'puzzle') {
      setTimeout(() => alert('Game Over!'), 100);
    }
  } else {
    // Snap back immediately on invalid move
    const fromEl = boardEl.querySelector(`[data-square="${from}"] .piece`);
    if (fromEl) {
      fromEl.classList.add('shake');
      setTimeout(() => fromEl.classList.remove('shake'), 400);
    }
  }
}

function showPromotionDialog() {
  promoDialog.classList.remove('hidden');
}

document.querySelectorAll('.promo-piece').forEach(el => {
  el.addEventListener('click', function() {
    const promo = this.dataset.piece;
    promoDialog.classList.add('hidden');
    if (pendingMove) {
      attemptMove(pendingMove.from, pendingMove.to, promo);
      pendingMove = null;
    }
  });
});

function makeAIMove() {
  if (gameMode !== 'ai' || game.game_over()) return;
  const m = getBestMove(game, aiDepth);
  if (m) {
    game.move(m);
    playSound('move');
    updateBoard();
    if (game.game_over()) {
      setTimeout(() => alert('Game Over!'), 100);
    }
  }
}

// --- UI HELPERS ---

function highlightSquare(sq) {
  const el = boardEl.querySelector(`[data-square="${sq}"]`);
  if (el) el.classList.add('highlight');
}

function clearHighlights() {
  boardEl.querySelectorAll('.square').forEach(sq => {
    sq.classList.remove('highlight', 'legal-move');
  });
}

function highlightLegalMoves(sq) {
  const moves = game.moves({ square: sq, verbose: true });
  moves.forEach(m => {
    const el = boardEl.querySelector(`[data-square="${m.to}"]`);
    if (el) el.classList.add('legal-move');
  });
}

function updateMoveList() {
  const history = game.history();
  moveListEl.innerHTML = '';
  let str = '';
  for (let i = 0; i < history.length; i += 2) {
    str += `<div class="move-row">
      <span class="move-num">${(i/2)+1}.</span>
      <span class="move-san" onclick="jumpTo(${i})">${history[i]}</span>
      ${history[i+1] ? `<span class="move-san" onclick="jumpTo(${i+1})">${history[i+1]}</span>` : ''}
    </div>`;
  }
  moveListEl.innerHTML = str;
  moveListEl.scrollTop = moveListEl.scrollHeight;
}

function jumpTo(index) {
  if (gameMode === 'online') {
    alert("Time travel is disabled during live online matches.");
    return;
  }
  const history = game.history();
  game.reset();
  for (let i = 0; i <= index; i++) {
    game.move(history[i]);
  }
  updateBoard();
}

function playSound(type) {
  // Add lightweight HTML5 audio synthesis for minimal sound if desired.
}

// --- BUTTON EVENTS ---

document.getElementById('btnMenu').addEventListener('click', openWelcomeScreen);

document.getElementById('btnUndo').addEventListener('click', () => { 
  if (gameMode === 'online') { alert('Undo disabled in online multiplayer.'); return; }
  game.undo(); 
  if (gameMode === 'ai') game.undo(); 
  updateBoard(); 
});

document.getElementById('btnFlip').addEventListener('click', () => { 
  boardFlipped = !boardFlipped; 
  updateBoard(); 
});

document.getElementById('btnTheme').addEventListener('click', () => {
  document.body.classList.toggle('theme-light');
  document.body.classList.toggle('theme-dark');
});

document.getElementById('btnSave').addEventListener('click', () => {
  const pgn = game.pgn();
  try {
    google.script.run.withSuccessHandler(() => alert('Saved!')).saveGame(pgn);
  } catch (e) {
    localStorage.setItem('chess_save', pgn);
    alert('Saved to local storage.');
  }
});

document.getElementById('btnLoad').addEventListener('click', () => {
  try {
    google.script.run.withSuccessHandler(data => {
      if (data) { game.load_pgn(data); updateBoard(); }
    }).loadGame();
  } catch (e) {
    const data = localStorage.getItem('chess_save');
    if (data) { game.load_pgn(data); updateBoard(); }
  }
});

document.getElementById('btnExport').addEventListener('click', () => {
  const blob = new Blob([game.pgn()], {type: "text/plain;charset=utf-8"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'game.pgn';
  a.click();
});

window.importPGN = function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    game.load_pgn(evt.target.result);
    updateBoard();
  };
  reader.readAsText(file);
};

document.addEventListener('keydown', e => {
  if (e.key === 'u' && document.getElementById('welcome-screen').classList.contains('hidden')) { 
      document.getElementById('btnUndo').click(); 
  }
  if (e.key === 'f') { boardFlipped = !boardFlipped; updateBoard(); }
});

// --- EVALUATION BAR LOGIC ---

function triggerEvaluation(depth = 10) {
  if (gameMode === 'online') return; // Eval disabled in online mode to save bandwidth
  engineWorker.onEvalResult = updateEvalBar;
  engineWorker.evaluate(game.fen(), depth);
}

function updateEvalBar(cp, mate) {
  const fillEl = document.getElementById('eval-bar-fill');
  const textEl = document.getElementById('eval-bar-text');
  if (!fillEl || !textEl) return;

  let absoluteCp = cp;
  if (game.turn() === 'b') absoluteCp = -cp;
  
  let absoluteMate = mate;
  if (mate !== null && game.turn() === 'b') absoluteMate = -mate;

  let text = '';
  let percentage = 50;

  if (absoluteMate !== null) {
    text = (absoluteMate > 0 ? '+' : '-') + 'M' + Math.abs(absoluteMate);
    percentage = absoluteMate > 0 ? 100 : 0;
  } else {
    // Professional Sigmoid: 100 / (1 + exp(-cp/200))
    // This makes the center of the bar more sensitive and the ends more compressed.
    percentage = 100 / (1 + Math.exp(-absoluteCp / 200));
    
    let evalText = (absoluteCp / 100).toFixed(1);
    if (absoluteCp > 0) evalText = '+' + evalText;
    text = evalText;
  }

  // Adjust for orientation
  if (boardFlipped) {
    fillEl.style.height = (100 - percentage) + '%';
    document.getElementById('eval-bar-container').style.transform = 'rotate(180deg)';
    textEl.style.transform = 'translateY(-50%) rotate(180deg)';
  } else {
    fillEl.style.height = percentage + '%';
    document.getElementById('eval-bar-container').style.transform = '';
    textEl.style.transform = 'translateY(-50%)';
  }

  textEl.innerText = text;
}

// --- POST-GAME ANALYSIS MODE ---

let analysisHistory = [];
let analysisIndex = -1;
let fullGameAnalysis = []; // Stores { fen, move, eval, cpl, classification }

async function startAnalysisMode() {
  gameMode = 'analysis';
  analysisHistory = game.history({ verbose: true });
  analysisIndex = analysisHistory.length - 1;
  
  document.getElementById('main-controls').classList.add('hidden');
  document.getElementById('analysis-controls').classList.remove('hidden');
  document.getElementById('game-info-panel').innerText = "Analyzing Game...";
  
  // Show report section (initially empty/loading)
  document.getElementById('analysis-report').classList.remove('hidden');
  resetReportUI();

  await runFullGameAnalysis();
  
  updateBoard();
  triggerEvaluation(16); // High depth for current position
}

function resetReportUI() {
  document.getElementById('white-elo').innerText = "---";
  document.getElementById('black-elo').innerText = "---";
  document.getElementById('white-acc').innerText = "0%";
  document.getElementById('black-acc').innerText = "0%";
  document.getElementById('move-tally').innerHTML = '';
}

async function runFullGameAnalysis() {
  fullGameAnalysis = [];
  const history = game.history({ verbose: true });
  const tempGame = new Chess();
  
  // We need evals for all positions: start + after every move
  const fensToEval = [tempGame.fen()];
  for (let move of history) {
    tempGame.move(move);
    fensToEval.push(tempGame.fen());
  }

  const evals = [];
  for (let i = 0; i < fensToEval.length; i++) {
    const res = await new Promise(resolve => {
      engineWorker.onEvalResult = (cp, mate) => resolve({ cp, mate });
      engineWorker.evaluate(fensToEval[i], 12);
    });
    evals.push(res);
  }

  // Calculate CPL and Classify
  let whiteCPLs = [];
  let blackCPLs = [];
  let tallies = { best: 0, good: 0, inaccuracy: 0, mistake: 0, blunder: 0 };

  for (let i = 0; i < history.length; i++) {
    const prevEval = evals[i];
    const currEval = evals[i+1];
    const turn = i % 2 === 0 ? 'w' : 'b';

    let cpl = calculateCPL(prevEval, currEval, turn);
    let classification = classifyMove(cpl);
    
    if (turn === 'w') whiteCPLs.push(cpl);
    else blackCPLs.push(cpl);
    
    tallies[classification.toLowerCase()]++;
    
    fullGameAnalysis.push({
      move: history[i],
      eval: currEval,
      cpl: cpl,
      classification: classification
    });
  }

  displayAnalysisReport(whiteCPLs, blackCPLs, tallies);
  document.getElementById('game-info-panel').innerText = "Analysis Mode";
}

function calculateCPL(prev, curr, turn) {
  let p = prev.cp;
  if (prev.mate !== null) p = prev.mate > 0 ? 10000 : -10000;
  
  let c = curr.cp;
  if (curr.mate !== null) c = curr.mate > 0 ? 10000 : -10000;

  // CPL = Eval before move - Eval after move (from perspective of player who moved)
  // If turn is White, positive eval is good. CPL = p - c
  // If turn is Black, negative eval is good. CPL = (-p) - (-c) = c - p
  let cpl = turn === 'w' ? (p - c) : (c - p);
  return Math.max(0, cpl);
}

function classifyMove(cpl) {
  if (cpl < 20) return "Best";
  if (cpl <= 50) return "Good";
  if (cpl <= 100) return "Inaccuracy";
  if (cpl <= 250) return "Mistake";
  return "Blunder";
}

function displayAnalysisReport(wLabels, bLabels, tallies) {
  const acplW = wLabels.reduce((a,b) => a+b, 0) / (wLabels.length || 1);
  const acplB = bLabels.reduce((a,b) => a+b, 0) / (bLabels.length || 1);

  const eloW = estimateElo(acplW);
  const eloB = estimateElo(acplB);

  document.getElementById('white-elo').innerText = eloW;
  document.getElementById('black-elo').innerText = eloB;
  document.getElementById('white-acc').innerText = Math.round(Math.max(0, 100 - acplW/2)) + "%";
  document.getElementById('black-acc').innerText = Math.round(Math.max(0, 100 - acplB/2)) + "%";

  const tallyContainer = document.getElementById('move-tally');
  tallyContainer.innerHTML = `
    <div class="tally-item" style="border-left: 3px solid #00f3ff"><span>Best</span> <b>${tallies.best}</b></div>
    <div class="tally-item" style="border-left: 3px solid #00ff41"><span>Good</span> <b>${tallies.good}</b></div>
    <div class="tally-item" style="border-left: 3px solid #ffff00"><span>Inacc</span> <b>${tallies.inaccuracy}</b></div>
    <div class="tally-item" style="border-left: 3px solid #ffaa00"><span>Mistake</span> <b>${tallies.mistake}</b></div>
    <div class="tally-item" style="border-left: 3px solid #ff0000"><span>Blunder</span> <b>${tallies.blunder}</b></div>
  `;
}

function estimateElo(acpl) {
  // Heuristic: Elo = 3000 - (acpl * 25)
  let elo = 2900 - (acpl * 22);
  return Math.max(400, Math.min(3000, Math.round(elo)));
}

function exitAnalysisMode() {
  document.getElementById('analysis-controls').classList.add('hidden');
  document.getElementById('analysis-report').classList.add('hidden');
  document.getElementById('main-controls').classList.remove('hidden');
  openWelcomeScreen();
}

function goToAnalysisStep(index) {
  if (index < -1 || index >= analysisHistory.length) return;
  analysisIndex = index;
  
  game.reset();
  for (let i = 0; i <= index; i++) {
    game.move(analysisHistory[i]);
  }
  
  updateBoard();
  
  // Highlight the move classification if available
  if (index >= 0 && fullGameAnalysis[index]) {
    const move = fullGameAnalysis[index].move;
    const classification = fullGameAnalysis[index].classification.toLowerCase();
    
    const fromSq = boardEl.querySelector(`[data-square="${move.from}"]`);
    const toSq = boardEl.querySelector(`[data-square="${move.to}"]`);
    
    if (fromSq && toSq) {
      fromSq.classList.add('anno-' + classification);
      toSq.classList.add('anno-' + classification);
      
      const tag = document.createElement('div');
      tag.className = `move-classification-tag tag-${classification}`;
      tag.innerText = classification;
      toSq.appendChild(tag);
    }
  }

  triggerEvaluation(16);
}

document.getElementById('btnReview').addEventListener('click', startAnalysisMode);
document.getElementById('btnPrevMove').addEventListener('click', () => goToAnalysisStep(analysisIndex - 1));
document.getElementById('btnNextMove').addEventListener('click', () => goToAnalysisStep(analysisIndex + 1));
document.getElementById('btnExitAnalysis').addEventListener('click', exitAnalysisMode);

// START
document.addEventListener('DOMContentLoaded', () => {
  initBoard();
  document.getElementById('welcome-screen').classList.remove('hidden');
});
</script>
