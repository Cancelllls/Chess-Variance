<script>
// Game State
let game = new Chess();
let boardFlipped = false;
let showCoords = true;
let showHints = false;

// Multiplayer & Mode State
let gameMode = 'local'; // 'local', 'ai', 'online'
let playerColor = 'w';
let roomId = null;
let pollInterval = null;
let aiDepth = 2;

// DOM Elements
const boardEl = document.getElementById('board');
const moveListEl = document.getElementById('move-list');
const promoDialog = document.getElementById('promotion-dialog');
let pendingMove = null;
let selectedSquare = null;

// Premove & SVG State
let pendingPremove = null;
const premoveToggle = document.getElementById('premove-toggle');
const svgLayer = document.getElementById('svg-draw-layer');
let isRightClickDragging = false;
let rightClickStartSq = null;
let currentRightClickSq = null;

// Resilience State
let pollRetryCount = 0;
let backoffDelay = 1000;
let connectionStatus = 'green'; // 'green', 'yellow', 'red'

function setConnectionStatus(status) {
  connectionStatus = status;
  const dot = document.getElementById('connection-status');
  dot.className = 'conn-dot ' + status;
  
  if (status === 'red') {
    document.getElementById('disconnect-modal').classList.remove('hidden');
  }
}

// --- WELCOME SCREEN LOGIC ---

function showMenu(id) {
  document.querySelectorAll('.menu-section').forEach(el => el.classList.add('hidden'));
  const target = document.getElementById(id);
  if (target) target.classList.remove('hidden');
}

function closeWelcomeScreen() {
  document.getElementById('welcome-screen').classList.add('hidden');
  document.getElementById('main-app').style.filter = 'none';
  document.getElementById('main-app').style.pointerEvents = 'auto';
}

function openWelcomeScreen() {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  document.getElementById('welcome-screen').classList.remove('hidden');
  document.getElementById('main-app').style.filter = 'blur(5px)';
  document.getElementById('main-app').style.pointerEvents = 'none';
  showMenu('menu-main');
  roomId = null;
  setConnectionStatus('green');
  
  // Clear game-over overlays
  const overlay = boardEl.querySelector('.game-over-overlay');
  if (overlay) overlay.remove();
}

function startLocalMultiplayer() {
  gameMode = 'local';
  game.reset();
  boardFlipped = false;
  updateBoard();
  document.getElementById('game-info-panel').innerText = "Local Pass & Play";
  closeWelcomeScreen();
}

function startAIGame(color) {
  gameMode = 'ai';
  playerColor = color;
  aiDepth = parseInt(document.getElementById('ai-diff-slider').value);
  game.reset();
  boardFlipped = (color === 'b');
  updateBoard();
  document.getElementById('game-info-panel').innerText = "Playing vs Computer";
  closeWelcomeScreen();
  if (color === 'b') setTimeout(makeAIMove, 250);
}

function createOnlineRoom() {
  document.getElementById('online-status').innerText = "Creating room...";
  const undoBtn = document.getElementById('btnUndo');
  undoBtn.innerText = "Undo";
  undoBtn.disabled = false;
  try {
    google.script.run
      .withSuccessHandler(id => {
        roomId = id;
        gameMode = 'online';
        playerColor = 'w';
        boardFlipped = false;
        game.reset();
        updateBoard();
        document.getElementById('game-info-panel').innerText = "Room Code: " + roomId;
        closeWelcomeScreen();
        startPolling();
      })
      .withFailureHandler(e => {
        document.getElementById('online-status').innerText = "Server Error: Failed to create room.";
      })
      .createRoom();
  } catch(e) {
    document.getElementById('online-status').innerText = "Error: Network / Apps Script not detected.";
  }
}

function joinOnlineRoom() {
  const id = document.getElementById('room-code-input').value.toUpperCase();
  if(id.length !== 4) return;
  document.getElementById('online-status').innerText = "Joining...";
  const undoBtn = document.getElementById('btnUndo');
  undoBtn.innerText = "Undo";
  undoBtn.disabled = false;
  try {
    google.script.run
      .withSuccessHandler(res => {
        if (!res || !res.success) {
           document.getElementById('online-status').innerText = "Room not found.";
           return;
        }
        roomId = id;
        gameMode = 'online';
        playerColor = 'b';
        boardFlipped = true;
        const state = res.data;
        if (state && state.fen) {
          game.load(state.fen);
        } else {
          game.reset();
        }
        updateBoard();
        document.getElementById('game-info-panel').innerText = "Room Code: " + roomId;
        closeWelcomeScreen();
        startPolling();
      })
      .withFailureHandler(e => {
        document.getElementById('online-status').innerText = "Server Error: Failed to join room.";
      })
      .getGameState(id);
  } catch(e) {
    document.getElementById('online-status').innerText = "Error: Network / Apps Script not detected.";
  }
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollRetryCount = 0;
  backoffDelay = 1000;

  const poll = () => {
    if (gameMode !== 'online' || !roomId) return;
    
    google.script.run
      .withSuccessHandler(res => {
        if (!res || !res.success) {
          handlePollError("Server error: State unreachable.");
          return;
        }
        
        pollRetryCount = 0;
        backoffDelay = 1000;
        setConnectionStatus('green');

        const state = res.data;
        const tbToast = document.getElementById('takeback-toast');
        const drToast = document.getElementById('draw-toast');
        const isTakebackActive = !!state.takebackRequest;
        
        // Takeback sync
        if (state.takebackRequest && state.takebackRequest !== playerColor) {
          tbToast.classList.remove('hidden');
        } else {
          tbToast.classList.add('hidden');
        }

        // Draw sync
        if (state.drawOffer && state.drawOffer !== playerColor) {
          drToast.classList.remove('hidden');
        } else {
          drToast.classList.add('hidden');
        }

        // Game Over sync
        if (state.gameOver) {
          tbToast.classList.add('hidden');
          drToast.classList.add('hidden');
          handleRemoteGameOver(state.gameOver);
          return; 
        }

        if (state.fen !== game.fen()) {
          const currentHistory = game.history();
          const serverHistory = new Chess(state.fen).history();
          const isTakebackDetected = serverHistory.length < currentHistory.length;
          
          const loadSuccess = game.load(state.fen);
          if (!loadSuccess) {
              game.load(state.fen.split(' ')[0] + ' w KQkq - 0 1');
          }
          
          if (isTakebackDetected) {
            pendingPremove = null;
            clearHighlights();
            const undoBtn = document.getElementById('btnUndo');
            if (undoBtn.innerText === "Takeback Proposed...") {
              undoBtn.innerText = "Undo";
              undoBtn.disabled = false;
            }
          }
          
          updateBoard();
          playSound('move');

          if (pendingPremove && game.turn() === playerColor && !isTakebackActive) {
            const move = game.move({ from: pendingPremove.from, to: pendingPremove.to, promotion: 'q' });
            if (move) {
              const currentFen = game.fen();
              google.script.run
                .withFailureHandler(errorCallback)
                .makeMove(roomId, currentFen, game.game_over(), game.history().length);
              updateBoard();
              playSound('move');
            }
            pendingPremove = null;
          }
        }
        pollInterval = setTimeout(poll, 1000);
      })
      .withFailureHandler(e => {
        handlePollError(e);
      })
      .getGameState(roomId);
  };
  
  const handlePollError = (err) => {
    console.warn("Polling error:", err);
    pollRetryCount++;
    setConnectionStatus('yellow');
    if (pollRetryCount >= 4) {
      setConnectionStatus('red');
      return;
    }
    backoffDelay *= 2;
    pollInterval = setTimeout(poll, backoffDelay);
  };

  pollInterval = setTimeout(poll, 1000);
}

function handleRemoteGameOver(gameOver) {
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  document.getElementById('game-info-panel').innerText = `${gameOver.result} (${gameOver.reason})`;
  document.getElementById('btnReview').classList.remove('hidden');
  document.getElementById('btnUndo').classList.add('hidden');
  document.getElementById('btnDraw').classList.add('hidden');
  document.getElementById('btnResign').classList.add('hidden');
  
  const overlay = document.createElement('div');
  overlay.className = 'game-over-overlay';
  overlay.innerHTML = `
    <div class="overlay-content">
      <h2 style="margin:0">${gameOver.result}</h2>
      <p style="margin:5px 0 0; opacity:0.8">${gameOver.reason}</p>
    </div>
  `;
  boardEl.style.position = 'relative';
  boardEl.appendChild(overlay);
}

// --- BOARD LOGIC ---

function initBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const square = document.createElement('div');
      square.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
      square.dataset.row = r;
      square.dataset.col = c;
      square.dataset.square = String.fromCharCode(97 + c) + (8 - r);
      square.setAttribute('aria-label', square.dataset.square);
      
      if (c === 0) {
        const rank = document.createElement('div');
        rank.className = 'coord rank';
        rank.innerText = 8 - r;
        square.appendChild(rank);
      }
      if (r === 7) {
        const file = document.createElement('div');
        file.className = 'coord file';
        file.innerText = String.fromCharCode(97 + c);
        square.appendChild(file);
      }
      
      square.addEventListener('click', handleSquareClick);
      square.addEventListener('dragover', e => e.preventDefault());
      square.addEventListener('drop', handleDrop);
      
      boardEl.appendChild(square);
    }
  }
}

function updateBoard() {
  const b = game.board();
  const squares = boardEl.querySelectorAll('.square');
  
  boardEl.style.transform = boardFlipped ? 'rotate(180deg)' : '';
  
  squares.forEach(sq => {
    const r = parseInt(sq.dataset.row);
    const c = parseInt(sq.dataset.col);
    const piece = b[r][c];
    
    let existingPiece = sq.querySelector('.piece');
    let targetClass = piece ? `piece ${piece.color}${piece.type.toUpperCase()}` : '';
    
    if (piece) {
      if (!existingPiece) {
        existingPiece = document.createElement('div');
        existingPiece.draggable = true;
        existingPiece.addEventListener('dragstart', handleDragStart);
        sq.appendChild(existingPiece);
      }
      if (existingPiece.className !== targetClass) {
        existingPiece.className = targetClass;
        const imgKey = piece.color + piece.type.toUpperCase();
        existingPiece.style.backgroundImage = pieceImages[imgKey] ? `url("${pieceImages[imgKey]}")` : 'none';
      }
      existingPiece.dataset.square = sq.dataset.square;
      existingPiece.style.transform = boardFlipped ? 'rotate(180deg)' : '';
    } else {
      if (existingPiece) existingPiece.remove();
    }
    
    const coords = sq.querySelectorAll('.coord');
    coords.forEach(coord => {
      coord.style.transform = boardFlipped ? 'rotate(180deg)' : '';
      coord.style.display = showCoords ? 'block' : 'none';
    });

    sq.classList.remove('highlight', 'last-move', 'in-check');
    sq.classList.remove('anno-best', 'anno-good', 'anno-inaccuracy', 'anno-mistake', 'anno-blunder');
    sq.classList.remove('premove');
    const oldTag = sq.querySelector('.move-classification-tag');
    if (oldTag) oldTag.remove();

    if (pendingPremove && (sq.dataset.square === pendingPremove.from || sq.dataset.square === pendingPremove.to)) {
      sq.classList.add('premove');
    }
  });

  if (game.in_check()) {
    const kColor = game.turn();
    squares.forEach(sq => {
      const r = parseInt(sq.dataset.row);
      const c = parseInt(sq.dataset.col);
      const p = b[r][c];
      if (p && p.type === 'k' && p.color === kColor) {
        sq.classList.add('in-check');
      }
    });
  }

  if (game.game_over()) {
    document.getElementById('btnReview').classList.remove('hidden');
    document.getElementById('btnUndo').classList.add('hidden');
    document.getElementById('btnDraw').classList.add('hidden');
    document.getElementById('btnResign').classList.add('hidden');
  } else {
    document.getElementById('btnReview').classList.add('hidden');
    if (gameMode !== 'analysis') {
      const undoBtn = document.getElementById('btnUndo');
      undoBtn.classList.remove('hidden');
      undoBtn.disabled = (game.history().length === 0);
      undoBtn.style.opacity = (game.history().length === 0) ? '0.5' : '1';
      
      if (gameMode === 'online') {
        document.getElementById('btnDraw').classList.remove('hidden');
        document.getElementById('btnResign').classList.remove('hidden');
      }
    }
  }

  updateMoveList();
  if (gameMode !== 'online' && gameMode !== 'analysis' && gameMode !== 'idle') {
    triggerEvaluation();
  }
}

// --- SVG VISUALIZATION ---

function getSquareCenter(sq) {
  const el = boardEl.querySelector(`[data-square="${sq}"]`);
  if (!el) return { x: 0, y: 0 };
  const rect = el.getBoundingClientRect();
  const boardRect = boardEl.getBoundingClientRect();
  return {
    x: (rect.left - boardRect.left) + rect.width / 2,
    y: (rect.top - boardRect.top) + rect.height / 2
  };
}

function drawCircle(sq) {
  const center = getSquareCenter(sq);
  const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  circle.setAttribute("cx", center.x);
  circle.setAttribute("cy", center.y);
  circle.setAttribute("r", "40%");
  circle.setAttribute("fill", "none");
  circle.setAttribute("stroke", "#f23c32");
  circle.setAttribute("stroke-width", "4");
  circle.setAttribute("opacity", "0.7");
  svgLayer.appendChild(circle);
}

function drawArrow(from, to) {
  const start = getSquareCenter(from);
  const end = getSquareCenter(to);
  const dx = end.x - start.x;
  const dy = end.y - start.y;
  const angle = Math.atan2(dy, dx);
  const length = Math.sqrt(dx*dx + dy*dy);
  const backOff = 15;
  const endX = start.x + Math.cos(angle) * (length - backOff);
  const endY = start.y + Math.sin(angle) * (length - backOff);

  const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
  line.setAttribute("x1", start.x);
  line.setAttribute("y1", start.y);
  line.setAttribute("x2", endX);
  line.setAttribute("y2", endY);
  line.setAttribute("stroke", "#f23c32");
  line.setAttribute("stroke-width", "8");
  line.setAttribute("opacity", "0.7");
  line.setAttribute("marker-end", "url(#arrowhead)");
  svgLayer.appendChild(line);
}

function clearSVG() {
  svgLayer.innerHTML = '';
}

// --- INTERACTION ---

function handleSquareClick(e) {
  clearSVG();
  if (gameMode === 'analysis') return;
  
  const sq = e.currentTarget.dataset.square;
  if (pendingPremove) {
    pendingPremove = null;
    updateBoard();
    return;
  }

  if (gameMode !== 'local' && game.turn() !== playerColor) return;
  
  if (selectedSquare) {
    attemptMove(selectedSquare, sq);
    selectedSquare = null;
    clearHighlights();
  } else {
    const p = game.get(sq);
    if (p && p.color === game.turn()) {
      selectedSquare = sq;
      highlightSquare(sq);
      highlightLegalMoves(sq);
    }
  }
}

function handleDragStart(e) {
  clearSVG();
  if (gameMode === 'analysis') { e.preventDefault(); return; }
  
  if (connectionStatus !== 'green' && gameMode === 'online') {
    e.preventDefault();
    return;
  }

  const isOpponentTurn = (gameMode === 'online' && game.turn() !== playerColor);
  const isPremoveEnabled = premoveToggle.checked;
  
  const sq = e.target.dataset.square;
  const p = game.get(sq);

  if (isOpponentTurn) {
    if (!isPremoveEnabled || (p && p.color !== playerColor)) {
      e.preventDefault();
      return;
    }
  } else {
    pendingPremove = null;
    if (p && p.color !== playerColor) {
      e.preventDefault();
      return;
    }
  }
  
  selectedSquare = sq;
  e.dataTransfer.setData('text/plain', selectedSquare);
  if (!isOpponentTurn) highlightLegalMoves(selectedSquare);
}

function handleDrop(e) {
  e.preventDefault();
  const from = e.dataTransfer.getData('text/plain');
  let target = e.target;
  if (target.classList.contains('piece')) target = target.parentElement;
  const to = target.dataset.square;
  
  const isOpponentTurn = (gameMode === 'online' && game.turn() !== playerColor);
  
  if (isOpponentTurn && premoveToggle.checked) {
    pendingPremove = { from, to };
    updateBoard();
    return;
  }

  if (from && to) attemptMove(from, to);
  selectedSquare = null;
  clearHighlights();
}

document.getElementById('board-wrapper').addEventListener('contextmenu', e => e.preventDefault());
document.getElementById('board-wrapper').addEventListener('mousedown', e => {
  if (e.button === 2) {
    isRightClickDragging = true;
    let target = e.target;
    if (target.classList.contains('piece')) target = target.parentElement;
    rightClickStartSq = target.dataset.square;
  }
});

document.addEventListener('mouseup', e => {
  if (e.button === 2 && isRightClickDragging) {
    isRightClickDragging = false;
    let target = e.target;
    if (target.classList.contains('piece')) target = target.parentElement;
    const endSq = target.dataset.square;
    if (rightClickStartSq && endSq) {
      if (rightClickStartSq === endSq) drawCircle(endSq);
      else drawArrow(rightClickStartSq, endSq);
    }
    rightClickStartSq = null;
  }
});

let previousFen = null;

function errorCallback(error) {
  if (previousFen) {
    game.load(previousFen);
    updateBoard();
    alert("Network error: Move not saved. Reverting.");
  }
}

function attemptMove(from, to, promo = null) {
  const drToast = document.getElementById('draw-toast');
  if (!drToast.classList.contains('hidden')) {
    drToast.classList.add('hidden');
    if (gameMode === 'online') google.script.run.resolveDraw(roomId, false);
  }
  document.getElementById('takeback-toast').classList.add('hidden');
  
  if (gameMode !== 'local' && game.turn() !== playerColor) return;

  const moves = game.moves({ verbose: true });
  const move = moves.find(m => m.from === from && m.to === to);
  
  if (move) {
    if (move.flags.includes('p') && !promo) {
      pendingMove = { from, to };
      showPromotionDialog();
      return;
    }
    
    previousFen = game.fen();
    game.move({ from, to, promotion: promo || 'q' });
    playSound('move');
    updateBoard();
    
    if (gameMode === 'online') {
      const currentFen = game.fen();
      const isGameOver = game.game_over();
      const moveCount = game.history().length;
      try { 
        google.script.run
          .withSuccessHandler(res => {
            if (res && !res.success) errorCallback(res.error);
          })
          .withFailureHandler(errorCallback)
          .makeMove(roomId, currentFen, isGameOver, moveCount);
      } catch(e) {
        errorCallback(e);
      }
    } else if (gameMode === 'ai' && !game.game_over()) {
      setTimeout(makeAIMove, 250);
    } else if (gameMode === 'puzzle') {
      const uciMove = from + to + (promo || '');
      if (uciMove === puzzleSolution[currentPuzzleStep]) {
        currentPuzzleStep++;
        if (currentPuzzleStep >= puzzleSolution.length) {
          setTimeout(() => alert('Puzzle solved!'), 100);
        } else {
          setTimeout(() => {
            const oppMove = puzzleSolution[currentPuzzleStep];
            game.move(oppMove, {sloppy: true});
            playSound('move');
            updateBoard();
            currentPuzzleStep++;
            if (currentPuzzleStep >= puzzleSolution.length) {
              setTimeout(() => alert('Puzzle solved!'), 100);
            }
          }, 500);
        }
      } else {
        setTimeout(() => alert('Incorrect move. Try again.'), 100);
        game.undo();
        updateBoard();
      }
    }

    if (game.game_over() && gameMode !== 'puzzle') {
      setTimeout(() => alert('Game Over!'), 100);
    }
  } else {
    const fromEl = boardEl.querySelector(`[data-square="${from}"] .piece`);
    if (fromEl) {
      fromEl.classList.add('shake');
      setTimeout(() => fromEl.classList.remove('shake'), 400);
    }
  }
  selectedSquare = null;
  clearHighlights();
}

function showPromotionDialog() {
  promoDialog.classList.remove('hidden');
}

document.querySelectorAll('.promo-piece').forEach(el => {
  el.addEventListener('click', function() {
    const promo = this.dataset.piece;
    promoDialog.classList.add('hidden');
    if (pendingMove) {
      attemptMove(pendingMove.from, pendingMove.to, promo);
      pendingMove = null;
    }
  });
});

function makeAIMove() {
  if (gameMode !== 'ai' || game.game_over()) return;
  const m = getBestMove(game, aiDepth);
  if (m) {
    game.move(m);
    playSound('move');
    updateBoard();
    if (game.game_over()) {
      setTimeout(() => alert('Game Over!'), 100);
    }
  }
}

// --- UI HELPERS ---

function highlightSquare(sq) {
  const el = boardEl.querySelector(`[data-square="${sq}"]`);
  if (el) el.classList.add('highlight');
}

function clearHighlights() {
  boardEl.querySelectorAll('.square').forEach(sq => {
    sq.classList.remove('highlight', 'legal-move');
  });
}

function highlightLegalMoves(sq) {
  const moves = game.moves({ square: sq, verbose: true });
  moves.forEach(m => {
    const el = boardEl.querySelector(`[data-square="${m.to}"]`);
    if (el) el.classList.add('legal-move');
  });
}

function updateMoveList() {
  const history = game.history({ verbose: true });
  moveListEl.innerHTML = '';
  let html = '';
  for (let i = 0; i < history.length; i += 2) {
    const turnNum = Math.floor(i / 2) + 1;
    const isWActive = (analysisIndex === i);
    const isBActive = (analysisIndex === i + 1);
    html += `
      <div class="move-row">
        <div class="move-num">${turnNum}.</div>
        <div class="move-val ${isWActive ? 'active' : ''}" onclick="goToAnalysisStep(${i})">
          ${history[i].san}
          ${renderMoveBadge(i)}
        </div>
        ${history[i+1] ? `
          <div class="move-val ${isBActive ? 'active' : ''}" onclick="goToAnalysisStep(${i+1})">
            ${history[i+1].san}
            ${renderMoveBadge(i+1)}
          </div>
        ` : '<div class="move-val"></div>'}
      </div>
    `;
  }
  moveListEl.innerHTML = html;
  const activeMove = moveListEl.querySelector('.active');
  if (activeMove) activeMove.scrollIntoView({ block: 'nearest' });
  else moveListEl.scrollTop = moveListEl.scrollHeight;
}

function renderMoveBadge(index) {
  if (gameMode !== 'analysis' || !fullGameAnalysis[index]) return '';
  const classification = fullGameAnalysis[index].classification.toLowerCase();
  const icons = { brilliant: '!!', great: '!', best: '★', inaccuracy: '?!', mistake: '?', blunder: '??' };
  return `<span class="badge badge-${classification}">${icons[classification] || ''}</span>`;
}

function jumpTo(index) {
  if (gameMode === 'online') {
    alert("Time travel is disabled during live online matches.");
    return;
  }
  const history = game.history();
  game.reset();
  for (let i = 0; i <= index; i++) {
    game.move(history[i]);
  }
  updateBoard();
}

function playSound(type) {}

// --- BUTTON EVENTS ---

let resignStep = 0;
document.getElementById('btnResign').addEventListener('click', function() {
  if (resignStep === 0) {
    this.innerText = "Sure?";
    this.style.background = "#fa412d";
    resignStep = 1;
    setTimeout(() => {
      this.innerText = "🏳 Resign";
      this.style.background = "";
      resignStep = 0;
    }, 3000);
  } else {
    google.script.run.resignGame(roomId, playerColor);
    resignStep = 0;
  }
});

document.getElementById('btnDraw').addEventListener('click', function() {
  this.disabled = true;
  this.innerText = "Draw Offered...";
  google.script.run.offerDraw(roomId, playerColor);
});

document.getElementById('btnAcceptDraw').addEventListener('click', () => {
  document.getElementById('draw-toast').classList.add('hidden');
  google.script.run.resolveDraw(roomId, true);
});

document.getElementById('btnDeclineDraw').addEventListener('click', () => {
  document.getElementById('draw-toast').classList.add('hidden');
  google.script.run.resolveDraw(roomId, false);
});

document.getElementById('btnMenu').addEventListener('click', openWelcomeScreen);

    btn.innerText = "Takeback Proposed...";
    btn.disabled = true;
    google.script.run
      .withSuccessHandler(res => {
        if (res && !res.success) {
           btn.innerText = originalText;
           btn.disabled = false;

        btn.disabled = false;

// --- EVALUATION BAR LOGIC ---

let evalDebounceTimeout = null;

function triggerEvaluation(depth = 10) {
  if (gameMode === 'online') return;
  if (evalDebounceTimeout) clearTimeout(evalDebounceTimeout);
  evalDebounceTimeout = setTimeout(() => {
    enginePool.onEvalResult = (cp, mate, taskId) => {
      if (taskId === 'live') updateEvalBar(cp, mate);
    };
    enginePool.evaluate(game.fen(), depth, 'live');
  }, 250);
}

function updateEvalBar(cp, mate) {
  const fillEl = document.getElementById('eval-bar-fill');
  const textEl = document.getElementById('eval-bar-text');
  if (!fillEl || !textEl) return;

  let absoluteCp = cp;
  if (game.turn() === 'b') absoluteCp = -cp;
  let absoluteMate = mate;
  if (mate !== null && game.turn() === 'b') absoluteMate = -mate;

  let text = '';
  let percentage = 50;

  if (absoluteMate !== null) {
    text = 'M' + Math.abs(absoluteMate);
    percentage = absoluteMate > 0 ? 100 : 0;
  } else {
    percentage = 100 / (1 + Math.exp(-absoluteCp / 200));
    text = (Math.abs(absoluteCp) / 100).toFixed(1);
  }

  if (boardFlipped) {
    fillEl.style.height = (100 - percentage) + '%';
    textEl.className = percentage > 50 ? 'eval-bar-text top' : 'eval-bar-text bottom';
  } else {
    fillEl.style.height = percentage + '%';
    textEl.className = percentage > 50 ? 'eval-bar-text bottom' : 'eval-bar-text top';
  }
  textEl.innerText = text;
}

// --- POST-GAME ANALYSIS MODE ---

let analysisHistory = [];
let analysisIndex = -1;
let fullGameAnalysis = [];

async function startAnalysisMode() {
  gameMode = 'analysis';
  analysisHistory = game.history({ verbose: true });
  analysisIndex = analysisHistory.length - 1;
  document.getElementById('main-controls').classList.add('hidden');
  document.getElementById('analysis-controls').classList.remove('hidden');
  document.getElementById('game-info-panel').innerText = "Analyzing Game...";
  document.getElementById('analysis-report').classList.remove('hidden');
  resetReportUI();

  const startTime = performance.now();
  await runFullGameAnalysis();
  const endTime = performance.now();
  
  document.getElementById('execution-time').innerText = Math.round(endTime - startTime);
  document.getElementById('thread-count').innerText = enginePool.poolSize;

  updateBoard();
  triggerEvaluation(16);
}

function resetReportUI() {
  document.getElementById('white-elo').innerText = "---";
  document.getElementById('black-elo').innerText = "---";
  document.getElementById('white-acc').innerText = "0%";
  document.getElementById('black-acc').innerText = "0%";
  document.getElementById('move-tally').innerHTML = '';
}

async function runFullGameAnalysis() {
  fullGameAnalysis = [];
  const history = game.history({ verbose: true });
  const tempGame = new Chess();
  const fensToEval = [tempGame.fen()];
  for (let move of history) {
    tempGame.move(move);
    fensToEval.push(tempGame.fen());
  }

  const evalPromises = fensToEval.map((fen, index) => {
    return new Promise(resolve => {
      const checkResult = (cp, mate, taskId) => {
        if (taskId === `batch_${index}`) resolve({ cp, mate });
      };
      const originalListener = enginePool.onEvalResult;
      enginePool.onEvalResult = (cp, mate, taskId) => {
        if (originalListener) originalListener(cp, mate, taskId);
        checkResult(cp, mate, taskId);
      };
      enginePool.evaluate(fen, 12, `batch_${index}`);
    });
  });

  const evals = await Promise.all(evalPromises);
  let whiteCPLs = [];
  let blackCPLs = [];
  let tallies = { brilliant: 0, great: 0, best: 0, good: 0, inaccuracy: 0, mistake: 0, blunder: 0 };

  for (let i = 0; i < history.length; i++) {
    const prevEval = evals[i];
    const currEval = evals[i+1];
    const turn = i % 2 === 0 ? 'w' : 'b';
    let cpl = calculateCPL(prevEval, currEval, turn);
    let classification = classifyMove(cpl);
    if (turn === 'w') whiteCPLs.push(cpl); else blackCPLs.push(cpl);
    tallies[classification.toLowerCase()]++;
    fullGameAnalysis.push({ move: history[i], eval: currEval, cpl: cpl, classification: classification });
  }

  displayAnalysisReport(whiteCPLs, blackCPLs, tallies);
  document.getElementById('game-info-panel').innerText = "Analysis Mode";
}

function calculateCPL(prev, curr, turn) {
  let p = prev.cp; if (prev.mate !== null) p = prev.mate > 0 ? 10000 : -10000;
  let c = curr.cp; if (curr.mate !== null) c = curr.mate > 0 ? 10000 : -10000;
  let cpl = turn === 'w' ? (p - c) : (c - p);
  return Math.max(0, cpl);
}

function classifyMove(cpl) {
  if (cpl < 5) return "Brilliant";
  if (cpl < 12) return "Great";
  if (cpl < 25) return "Best";
  if (cpl <= 55) return "Good";
  if (cpl <= 110) return "Inaccuracy";
  if (cpl <= 260) return "Mistake";
  return "Blunder";
}

function displayAnalysisReport(wLabels, bLabels, tallies) {
  const acplW = wLabels.reduce((a,b) => a+b, 0) / (wLabels.length || 1);
  const acplB = bLabels.reduce((a,b) => a+b, 0) / (bLabels.length || 1);
  const eloW = estimateElo(acplW);
  const eloB = estimateElo(acplB);
  const accW = Math.round(Math.max(0, 100 - acplW/2));
  const accB = Math.round(Math.max(0, 100 - acplB/2));

  document.getElementById('white-elo').innerText = eloW;
  document.getElementById('black-elo').innerText = eloB;
  document.getElementById('white-acc').innerText = accW + "%";
  document.getElementById('black-acc').innerText = accB + "%";
  
  const setRing = (id, val) => {
    const offset = 226 - (226 * val) / 100;
    document.getElementById(id).style.strokeDashoffset = offset;
  };
  setRing('white-acc-ring', accW);
  setRing('black-acc-ring', accB);

  const tallyContainer = document.getElementById('move-tally');
  const items = [
    { label: 'Brilliant', key: 'brilliant', color: 'var(--color-brilliant)' },
    { label: 'Great', key: 'great', color: 'var(--color-great)' },
    { label: 'Best', key: 'best', color: 'var(--color-best)' },
    { label: 'Inacc', key: 'inaccuracy', color: 'var(--color-inaccuracy)' },
    { label: 'Mistake', key: 'mistake', color: 'var(--color-mistake)' },
    { label: 'Blunder', key: 'blunder', color: 'var(--color-blunder)' }
  ];
  tallyContainer.innerHTML = items.map(i => `
    <div class="tally-item" style="border-left: 3px solid ${i.color}">
      <span>${i.label}</span>
      <b>${tallies[i.key] || 0}</b>
    </div>
  `).join('');
}

function estimateElo(acpl) {
  let elo = 2900 - (acpl * 22);
  return Math.max(400, Math.min(3000, Math.round(elo)));
}

function exitAnalysisMode() {
  document.getElementById('analysis-controls').classList.add('hidden');
  document.getElementById('analysis-report').classList.add('hidden');
  document.getElementById('main-controls').classList.remove('hidden');
  openWelcomeScreen();
}

function goToAnalysisStep(index) {
  if (index < -1 || index >= analysisHistory.length) return;
  analysisIndex = index;
  game.reset();
  for (let i = 0; i <= index; i++) game.move(analysisHistory[i]);
  updateBoard();
  if (index >= 0 && fullGameAnalysis[index]) {
    const move = fullGameAnalysis[index].move;
    const classification = fullGameAnalysis[index].classification.toLowerCase();
    const toSq = boardEl.querySelector(`[data-square="${move.to}"]`);
    if (toSq) {
      const icons = { brilliant: '!!', great: '!', best: '★', inaccuracy: '?!', mistake: '?', blunder: '??' };
      const badge = document.createElement('div');
      badge.className = `badge badge-${classification} square-badge`;
      badge.innerText = icons[classification] || '';
      toSq.appendChild(badge);
    }
  }
  triggerEvaluation(16);
}

document.getElementById('btnReview').addEventListener('click', startAnalysisMode);
document.getElementById('btnPrevMove').addEventListener('click', () => goToAnalysisStep(analysisIndex - 1));
document.getElementById('btnNextMove').addEventListener('click', () => goToAnalysisStep(analysisIndex + 1));
document.getElementById('btnExitAnalysis').addEventListener('click', exitAnalysisMode);
