<script>
// Game State
let game = null;
let visualGame = null;
try {
  game = new Chess();
  visualGame = game;
} catch(e) {

  const retry = () => {
    try {
      game = new Chess();
      visualGame = game;
      if (boardEl) { initBoard(); updateBoard(); }
    } catch(err) { setTimeout(retry, 500); }
  };
  setTimeout(retry, 500);
}
let boardFlipped = false;
let showCoords = true;
let showHints = false;
let isGameOverState = false;

// Multiplayer & Mode State
let gameMode = 'local'; // 'local', 'ai', 'online', 'puzzle', 'analysis'
let playerColor = 'w';
let playerRole = 'player'; // 'player' or 'spectator'
let playerName = "Guest_" + Math.random().toString(36).substring(2, 10);

let clockInterval = null;

let isWaitingForServer = false;
let isReviewing = false;
let previousFen = null;
const errorCallback = (e) => console.warn("Network Warning:", e);

// Clock State
let whiteTime = 300000;
let blackTime = 300000;
let lastServerSync = Date.now();
let isGamePaused = false;

// DOM Elements
let boardEl, moveListEl, promoDialog, premoveToggle, svgLayer;
let pendingMove = null;
let selectedSquare = null;

// Premove & SVG State
let pendingPremove = null;
let isRightClickDragging = false;
let rightClickStartSq = null;
let currentRightClickSq = null;

// Resilience State
let pollRetryCount = 0;
let backoffDelay = 1000;
let connectionStatus = 'green'; 

// --- AUDIO & HAPTICS CONTROLLER ---
const AudioController = {
  muted: false,
  ctx: null,
  init() {
    if (!this.ctx) {
      try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (this.ctx && this.ctx.state === 'suspended') {
      this.ctx.resume();
    }
  },
  play(type) {
    if (this.muted) return;
    
    // Hardware Haptics (Vibration API)
    if (navigator.vibrate) {
      if (type === 'move') navigator.vibrate(15);
      else if (type === 'capture') navigator.vibrate([30, 40]);
      else if (type === 'check' || type === 'gameEnd') navigator.vibrate([80, 50, 80]);
    }

    // Web Audio Synthesis (High Polish Wood Click sound synthesis)
    try {
      this.init();
      if (!this.ctx) return;
      const now = this.ctx.currentTime;
      
      if (type === 'move') {
        // Wooden Chess Move tap
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(350, now);
        osc.frequency.exponentialRampToValueAtTime(120, now + 0.08);
        
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
        
        osc.start(now);
        osc.stop(now + 0.09);
      } 
      else if (type === 'capture') {
        // Wooden Chess Piece Capture clack
        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(280, now);
        osc1.frequency.exponentialRampToValueAtTime(80, now + 0.06);
        
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(600, now);
        osc2.frequency.exponentialRampToValueAtTime(300, now + 0.04);
        
        gain.gain.setValueAtTime(0.35, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
        
        osc1.start(now);
        osc2.start(now);
        osc1.stop(now + 0.09);
        osc2.stop(now + 0.09);
      }
      else if (type === 'check') {
        // Alert Chime
        const osc1 = this.ctx.createOscillator();
        const osc2 = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(780, now);
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(1040, now);
        
        gain.gain.setValueAtTime(0.18, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
        
        osc1.start(now);
        osc2.start(now);
        osc1.stop(now + 0.4);
        osc2.stop(now + 0.4);
      }
      else if (type === 'gameEnd') {
        // Elegant organ chord chime
        const frequencies = [261.63, 329.63, 392.00, 523.25]; // C major chord
        const gain = this.ctx.createGain();
        gain.connect(this.ctx.destination);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
        
        frequencies.forEach(f => {
          const osc = this.ctx.createOscillator();
          osc.connect(gain);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(f, now);
          osc.start(now);
          osc.stop(now + 1.3);
        });
      }
    } catch(e) {}
  }
};

// Wake audio context on first user interaction
document.body.addEventListener('click', () => AudioController.init(), { once: true });

function setConnectionStatus(status) {
  connectionStatus = status;
  const dot = document.getElementById('connection-status');
  const modal = document.getElementById('disconnect-modal');
  
  if (dot) dot.className = 'conn-dot ' + status;
  
  // Show reconnecting modal for any non-green status
  if (modal) {
    if (status === 'yellow' || status === 'red') {
      modal.classList.remove('hidden');
    } else {
      modal.classList.add('hidden');
    }
  }
}

// --- CLOCK LOGIC ---
function updateClocks() {
  const now = Date.now();
  if (gameMode === 'online' && !game.game_over() && !isGamePaused) {
    if (whiteTime !== null && blackTime !== null) {
      const elapsed = now - lastServerSync;
      if (game.turn() === 'w') whiteTime = Math.max(0, whiteTime - elapsed);
      else blackTime = Math.max(0, blackTime - elapsed);
      lastServerSync = now;
      
      if (whiteTime <= 0 || blackTime <= 0) {
        if (clockInterval) clearInterval(clockInterval);
      }
    }
  } else {
    // If paused or local/AI, just keep the sync anchor moving to avoid sudden jumps
    lastServerSync = now;
  }
  
  const formatTime = (ms) => {
    if (ms === null) return "∞";
    const totalSec = Math.floor(ms / 1000);
    const min = Math.floor(totalSec / 60);
    const sec = totalSec % 60;
    return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
  };

  const topClock = document.getElementById('clock-top');
  const botClock = document.getElementById('clock-bottom');
  
  if (topClock) {
    const time = boardFlipped ? whiteTime : blackTime;
    const isTopActive = boardFlipped ? (game.turn() === 'w') : (game.turn() === 'b');
    topClock.innerText = formatTime(time);
    topClock.classList.toggle('active', isTopActive && time !== null);
    topClock.classList.toggle('low-time', time !== null && time < 30000);
  }
  if (botClock) {
    const time = boardFlipped ? blackTime : whiteTime;
    const isBotActive = boardFlipped ? (game.turn() === 'b') : (game.turn() === 'w');
    botClock.innerText = formatTime(time);
    botClock.classList.toggle('active', isBotActive && time !== null);
    botClock.classList.toggle('low-time', time !== null && time < 30000);
  }
}

// --- WELCOME SCREEN LOGIC ---
function showMenu(id) {
  document.querySelectorAll('.menu-section').forEach(el => el.classList.add('hidden'));
  const target = document.getElementById(id);
  if (target) target.classList.remove('hidden');
}


function resetWholeGame() {
  // 1. Reset JavaScript chess state
  if (typeof game !== 'undefined' && game.reset) game.reset();
  
  // 2. Reset analysis/multiplayer states
  isReviewing = false;
  isGameOverState = false;
  analysisHistory = [];
  analysisIndex = -1;
  fullGameAnalysis = [];
  onlineGameState = null;
  opponentName = null;

  // 3. Clear board overlays and visual highlights
  if (typeof boardEl !== 'undefined' && boardEl) {
    boardEl.querySelectorAll('.badge').forEach(b => b.remove());
    boardEl.querySelectorAll('.game-over-overlay').forEach(o => o.remove());
    if (typeof clearHighlights === 'function') clearHighlights();
  }
  
  pendingPremove = null;
  selectedSquare = null;

  // 4. Reset evaluation bar visual
  const fillEl = document.getElementById('eval-bar-fill');
  const textEl = document.getElementById('eval-bar-text');
  if (fillEl) fillEl.style.height = '50%';
  if (textEl) {
    textEl.innerText = '0.0';
    textEl.className = 'eval-bar-text bottom';
  }

  // 5. Hide analysis loading progress card and results card
  const loadingEl = document.getElementById('analysis-loading');
  const resultsEl = document.getElementById('analysis-results');
  if (loadingEl) loadingEl.classList.add('hidden');
  if (resultsEl) resultsEl.classList.add('hidden');

  // 6. Reset sidebar panels
  const reportEl = document.getElementById('analysis-report');
  if (reportEl) reportEl.classList.add('hidden');
  
  const analysisControls = document.getElementById('analysis-controls');
  if (analysisControls) analysisControls.classList.add('hidden');
  
  const mainControls = document.getElementById('main-controls');
  if (mainControls) mainControls.classList.remove('hidden');

  const moveList = document.getElementById('move-list');
  if (moveList) moveList.innerHTML = '';
  
  // 7. Stop clocks
  if (clockInterval) {
    clearInterval(clockInterval);
    clockInterval = null;
  }
  whiteTime = blackTime = 300000; // default 5m
}
window.resetWholeGame = resetWholeGame;

/**
 * UI STATE MANAGEMENT
 */
function setGameState(isInGame) {
  const ws = document.getElementById('welcome-menus');
  const gameSidebar = document.getElementById('game-sidebar-content');
  const mainApp = document.getElementById('main-app');
  const waitOverlay = document.getElementById('waiting-overlay');
  const playerTopCard = document.getElementById('player-top-card');
  const playerBottomCard = document.getElementById('player-bottom-card');
  
  if (mainApp) {
    mainApp.style.setProperty('display', 'flex', 'important');
    mainApp.style.setProperty('visibility', 'visible', 'important');
    mainApp.style.setProperty('opacity', '1', 'important');
    mainApp.style.setProperty('filter', 'none', 'important');
    mainApp.style.setProperty('pointer-events', 'auto', 'important');
    mainApp.classList.remove('hidden');
  }

  if (isInGame) {
    if (ws) {
      ws.classList.add('hidden');
      ws.style.setProperty('display', 'none', 'important');
    }
    if (gameSidebar) {
      gameSidebar.classList.remove('hidden');
      gameSidebar.style.setProperty('display', 'flex', 'important');
    }
    if (waitOverlay) waitOverlay.classList.add('hidden');
    
    if (playerTopCard) playerTopCard.classList.remove('hidden');
    if (playerBottomCard) playerBottomCard.classList.remove('hidden');
    
    // Manage puzzle controls
    const pc = document.getElementById('puzzle-controls');
    if (pc) {
      if (gameMode === 'puzzle') {
        pc.style.setProperty('display', 'grid', 'important');
        pc.classList.remove('hidden');
      } else {
        pc.style.setProperty('display', 'none', 'important');
        pc.classList.add('hidden');
      }
    }

    if (clockInterval) clearInterval(clockInterval);
    clockInterval = setInterval(updateClocks, 1000);
  } else {
    if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
    
    if (playerTopCard) playerTopCard.classList.add('hidden');
    if (playerBottomCard) playerBottomCard.classList.add('hidden');
    
    if (ws) {
      ws.classList.remove('hidden');
      ws.style.setProperty('display', 'block', 'important');
    }
    if (gameSidebar) {
      gameSidebar.classList.add('hidden');
      gameSidebar.style.setProperty('display', 'none', 'important');
    }
    
    if (waitOverlay) waitOverlay.classList.add('hidden');

    const pc = document.getElementById('puzzle-controls');
    if (pc) {
      pc.style.setProperty('display', 'none', 'important');
      pc.classList.add('hidden');
    }
    showMenu('menu-main');
    roomId = null;
    playerRole = 'player';
    setConnectionStatus('green');
  }
}

function closeWelcomeScreen() {
  setGameState(true);
}

function openWelcomeScreen() {
  setGameState(false);
  if (boardEl) {
    const overlay = boardEl.querySelector('.game-over-overlay');
    if (overlay) overlay.remove();
  }
}

function startLocalMultiplayer() {
  resetWholeGame();
  gameMode = 'local';
  closeWelcomeScreen();
  boardFlipped = false;
  whiteTime = blackTime = null; // Unlimited for local
  updateBoard();
  const infoEl = document.getElementById('game-info-panel');
  if (infoEl) infoEl.innerText = "Local Pass & Play";
}

function createOnlineRoom() {
  const timeControl = document.getElementById('time-control-select').value;
  document.getElementById('online-status').innerText = "Creating room...";
  const undoBtn = document.getElementById('btnUndo');
  undoBtn.innerText = "Undo";
  undoBtn.disabled = false;
  try {
    google.script.run
      .withSuccessHandler(id => {
        resetWholeGame();
        closeWelcomeScreen();
        roomId = id;
        gameMode = 'online';
        playerColor = 'w';
        playerRole = 'player';
        boardFlipped = false;
        const tc = (timeControl === "null") ? null : parseInt(timeControl, 10);
        whiteTime = blackTime = tc;
        
        onlineGameState = {
          whitePlayer: playerName,
          blackPlayer: null,
          whiteTime: tc,
          blackTime: tc
        };

        updateBoard();
        const infoEl = document.getElementById('game-info-panel');
        if (infoEl) infoEl.innerText = "Room Code: " + roomId;
        startPolling();
      })
      .withFailureHandler(e => {
        document.getElementById('online-status').innerText = "Server Error: Failed to create room.";
      })
      .createRoom(playerName, timeControl); 
  } catch(e) {
    document.getElementById('online-status').innerText = "Error: Network error detected.";
  }
}

function joinOnlineRoom() {
  const id = document.getElementById('room-code-input').value.toUpperCase();
  if(id.length !== 4) return;
  document.getElementById('online-status').innerText = "Joining...";
  const undoBtn = document.getElementById('btnUndo');
  undoBtn.innerText = "Undo";
  undoBtn.disabled = false;
  try {
    google.script.run
      .withSuccessHandler(res => {
        if (!res || !res.success) {
           document.getElementById('online-status').innerText = "Room not found.";
           return;
        }
        resetWholeGame();
        closeWelcomeScreen();
        roomId = id;
        gameMode = 'online';
        const state = res.data;
        onlineGameState = state;
        playerColor = res.role === 'spectator' ? 'w' : res.role;
        playerRole = res.role;
        boardFlipped = (playerColor === 'b');
        if (playerRole === 'spectator') {
          const badge = document.getElementById('spectator-badge');
          if (badge) badge.classList.remove('hidden');
        }
        
        game.load(state.fen || 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');
        whiteTime = state.whiteTime;
        blackTime = state.blackTime;
        lastServerSync = state.lastMoveTimestamp;
        
        updateBoard();
        const infoEl = document.getElementById('game-info-panel');
        if (infoEl) infoEl.innerText = "Room Code: " + roomId;
        startPolling();
      })
      .withFailureHandler(e => {
        document.getElementById('online-status').innerText = "Server Error: Failed to join room.";
      })
      .getGameState(id, playerName); 
  } catch(e) {

    document.getElementById('online-status').innerText = "Error: Network error detected.";
  }
}

function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollRetryCount = 0;
  backoffDelay = 1000;

  const poll = () => {
    if (gameMode !== 'online' || !roomId) return;
    
    google.script.run
      .withSuccessHandler(res => {
        if (!res || !res.success) {
          handlePollError();
          return;
        }
        
        // Reset backoff on success
        pollRetryCount = 0;
        backoffDelay = 1000;
        setConnectionStatus('green');

        const state = res.data;
        onlineGameState = state;
        isGamePaused = !!state.isPaused;
        
        // --- OPPONENT OFFLINE BANNER ---
        const banner = document.getElementById('opponent-offline-banner');
        if (isGamePaused) banner.classList.remove('hidden');
        else banner.classList.add('hidden');

        // AUTHORITATIVE SYNC (Check for drift)
        if (state.whiteTime !== null && state.blackTime !== null) {
          const wDelta = Math.abs(state.whiteTime - whiteTime);
          const bDelta = Math.abs(state.blackTime - blackTime);
          if (wDelta > 1000 || bDelta > 1000) {
            whiteTime = state.whiteTime;
            blackTime = state.blackTime;
          }
          lastServerSync = state.lastMoveTimestamp;
        }

        const tbToast = document.getElementById('takeback-toast');
        const drToast = document.getElementById('draw-toast');
        const isTakebackActive = !!state.takebackRequest;

        // Waiting overlay logic
        const waitingOverlay = document.getElementById('waiting-overlay');
        if (waitingOverlay) {
            if (!state.blackPlayer) {
               waitingOverlay.classList.remove('hidden');
               document.getElementById('waiting-code-display').innerText = roomId;
               isGamePaused = true;
            } else {
               waitingOverlay.classList.add('hidden');
            }
        }

        // Takeback sync
        if (state.takebackRequest && state.takebackRequest !== playerColor && playerRole !== 'spectator') {
          tbToast.classList.remove('hidden');
        } else {
          tbToast.classList.add('hidden');
        }

        // Draw sync
        if (state.drawOffer && state.drawOffer !== playerColor && playerRole !== 'spectator') {
          drToast.classList.remove('hidden');
        } else {
          drToast.classList.add('hidden');
        }

        // Game Over sync
        if (state.gameOver) {
          tbToast.classList.add('hidden');
          drToast.classList.add('hidden');
          handleRemoteGameOver(state.gameOver);
          return;
        }

        if (state.pgn !== game.pgn()) {
          const currentHistory = game.history();
          const serverGame = new Chess();
          serverGame.load_pgn(state.pgn || "");
          const serverHistory = serverGame.history();

          if (isWaitingForServer && serverHistory.length < currentHistory.length) {
             // Do nothing. Wait for server to catch up. Polling will continue below.
          } else {
            if (serverHistory.length >= currentHistory.length) {
               isWaitingForServer = false;
            }

            const isTakebackDetected = serverHistory.length < currentHistory.length && !isWaitingForServer;

            game.load_pgn(state.pgn || "");

            if (isTakebackDetected) {
              pendingPremove = null;
              boardEl.querySelectorAll('.square.premove').forEach(s => s.classList.remove('premove'));
              clearHighlights();
              const undoBtn = document.getElementById('btnUndo');
              if (undoBtn && undoBtn.innerText === "Proposing...") {
                undoBtn.innerText = "Undo";
                undoBtn.disabled = false;
              }
            }

            // --- UI SYNC ---
            if (!isReviewing) {
              visualGame = game;
              updateBoard();
            } else {
              updateMoveList(); // Keep the list updated even if viewing history
            }
            
            const lastMove = game.history({verbose:true}).pop();
            if (lastMove) {
              // Force resume audio context on move detection
              AudioController.init();
              const isCapture = lastMove.flags.includes('c') || lastMove.flags.includes('e');
              if (game.in_check()) AudioController.play('check');
              else if (isCapture) AudioController.play('capture');
              else AudioController.play('move');
            }
            
            // Trigger premove immediately if it's now our turn
            if (!isReviewing) checkPremove();
          }
        }

        pollInterval = setTimeout(poll, 1200);
        })
        .withFailureHandler(() => {
        handlePollError();
        })
        .getGameState(roomId, playerName);
        };

        const handlePollError = () => {
        pollRetryCount++;
        if (pollRetryCount > 3) {
        setConnectionStatus('yellow'); // Shows the infinite "Reconnecting..." overlay only after 3 tries
        }

        backoffDelay = Math.min(5000, backoffDelay * 2); // Cap at 5s, infinite retries
        pollInterval = setTimeout(poll, backoffDelay);
        };
  pollInterval = setTimeout(poll, 1000);
}

function handleRemoteGameOver(gameOver) {
  isGameOverState = true;
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null; }
  AudioController.play('gameEnd');
  document.getElementById('game-info-panel').innerText = `${gameOver.result} (${gameOver.reason})`;
  document.getElementById('btnReview').classList.remove('hidden');
  
  const overlay = document.createElement('div');
  overlay.className = 'game-over-overlay';
  overlay.innerHTML = `
    <div class="overlay-content">
      <h2 style="margin:0">${gameOver.result}</h2>
      <p style="margin:5px 0 0; opacity:0.8">${gameOver.reason}</p>
    </div>
  `;
  boardEl.style.position = 'relative';
  boardEl.appendChild(overlay);
}

function checkPremove() {
  if (pendingPremove && game.turn() === playerColor && !isWaitingForServer && playerRole !== 'spectator') {
    const isTakebackActive = !document.getElementById('takeback-toast').classList.contains('hidden');
    if (isTakebackActive) return;

    console.log("Executing premove:", pendingPremove);
    const from = pendingPremove.from;
    const to = pendingPremove.to;
    
    const moves = game.moves({ verbose: true });
    const move = moves.find(m => m.from === from && m.to === to);

    if (move) {
      const promo = move.flags.includes('p') ? 'q' : null;
      game.move({ from, to, promotion: promo || 'q' });
      
      pendingPremove = null; // Clear BEFORE server call to avoid double trigger
      
      if (gameMode === 'online') {
        isWaitingForServer = true;
        google.script.run
          .withSuccessHandler(res => { 
             isWaitingForServer = false;
             if (res && !res.success) errorCallback(res.error); 
          })
          .withFailureHandler(err => {
             isWaitingForServer = false;
             errorCallback(err);
          })
          .makeMove(roomId, game.fen(), game.pgn(), game.game_over(), game.history().length, playerColor);
      } else if (gameMode === 'ai' && !game.game_over()) {
        setTimeout(makeAIMove, 250);
      }
      
      updateBoard();
      const isPMCapture = move.flags.includes('c') || move.flags.includes('e');
      if (game.in_check()) AudioController.play('check');
      else if (isPMCapture) AudioController.play('capture');
      else AudioController.play('move');
      if (game.game_over()) AudioController.play('gameEnd');
    } else {
      console.warn("Premove illegal, clearing.");
      pendingPremove = null;
      updateBoard();
    }
  }
}

// --- BOARD LOGIC ---
let secretThemeClicks = 0;
let lastSecretClickTime = 0;

function initBoard() {
  boardEl.innerHTML = '';
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const square = document.createElement('div');
      const sqName = String.fromCharCode(97 + c) + (8 - r);
      square.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
      square.dataset.row = r;
      square.dataset.col = c;
      square.dataset.square = sqName;
      square.setAttribute('aria-label', sqName);
      
      if (sqName === 'a8') {
        square.addEventListener('mousedown', () => {
           const now = Date.now();
           if (now - lastSecretClickTime < 1000) secretThemeClicks++;
           else secretThemeClicks = 1;
           lastSecretClickTime = now;
           if (secretThemeClicks >= 3) {
             const current = document.body.getAttribute('data-theme');
             document.body.setAttribute('data-theme', current === 'cyberpunk' ? '' : 'cyberpunk');
             secretThemeClicks = 0;
           }
        });
      }
      
      square.addEventListener('mousedown', handleSquareClick);
      square.addEventListener('dragover', e => e.preventDefault());
      square.addEventListener('drop', handleDrop);
      boardEl.appendChild(square);
    }
  }
}

  let html = '';
  
  const icons = {

    great: '!', 
    best: '★', 
    excellent: '✓', 
    good: '✓', 
    book: '📖', 
    inaccuracy: '?!', 
    mistake: '?', 
    blunder: '??' 
  };

  for (let i = 0; i < hist.length; i += 2) {
    const wIdx = i;
    const bIdx = i + 1;

function updateBoard() {
  if (!boardEl) {
    boardEl = document.getElementById('board');
    if (!boardEl) return;
  }
  if (!visualGame) return; 

  // Sync player profiles on cards
  updatePlayerInfoCards(onlineGameState);

  // Clear existing coordinate elements from the board
  boardEl.querySelectorAll('.coord').forEach(el => el.remove());
  
  // PRE-ANIMATION: Capture current positions of all pieces
  const piecePositions = new Map();
  boardEl.querySelectorAll('.piece').forEach(p => {
    const rect = p.getBoundingClientRect();
    piecePositions.set(p.dataset.square, { x: rect.left, y: rect.top, el: p });
  });

  const b = visualGame.board();
  const squares = boardEl.querySelectorAll('.square');
  if (!squares || squares.length === 0) return;

  boardEl.style.transform = boardFlipped ? 'rotate(180deg)' : '';
  boardEl.classList.toggle('flipped', boardFlipped);
  
  // Highlighting the last move
  const history = visualGame.history({ verbose: true });
  const lastMove = history.length > 0 ? history[history.length - 1] : null;

  squares.forEach(sq => {
    const rowIdx = sq.dataset.row;
    const colIdx = sq.dataset.col;
    if (rowIdx === undefined || colIdx === undefined) return;
    
    const r = parseInt(rowIdx);
    const c = parseInt(colIdx);
    const piece = b[r][c];
    let existingPiece = sq.querySelector('.piece');
    
    // If there's a piece that moved here, try to reuse the element for animation
    if (piece && !existingPiece && lastMove && sq.dataset.square === lastMove.to) {
      const movedPieceInfo = piecePositions.get(lastMove.from);
      if (movedPieceInfo) {
        existingPiece = movedPieceInfo.el;
        sq.appendChild(existingPiece);
      }
    }

    if (piece) {
      if (!existingPiece) {
        existingPiece = document.createElement('div');
        existingPiece.draggable = true;
        existingPiece.addEventListener('dragstart', handleDragStart);
        existingPiece.addEventListener('dragend', handleDragEnd);
        sq.appendChild(existingPiece);
      }
      const targetClass = `piece ${piece.color}${piece.type.toUpperCase()}`;
      if (existingPiece.className !== targetClass) {
        existingPiece.className = targetClass;
        const imgKey = piece.color + piece.type.toUpperCase();
        existingPiece.style.backgroundImage = pieceImages[imgKey] ? `linear-gradient(transparent, transparent), url("${pieceImages[imgKey]}")` : 'none';
      }
      existingPiece.dataset.square = sq.dataset.square;
      existingPiece.style.transform = boardFlipped ? 'rotate(180deg)' : '';
    } else if (existingPiece) {
      existingPiece.remove();
    }

    sq.classList.remove('highlight', 'legal-move', 'in-check', 'premove', 'selected');
    
    // Highlight last move squares
    if (lastMove && (sq.dataset.square === lastMove.from || sq.dataset.square === lastMove.to)) {
      sq.classList.add('highlight');
    }

    if (pendingPremove && (sq.dataset.square === pendingPremove.from || sq.dataset.square === pendingPremove.to)) {
      sq.classList.add('premove');
    }

    // Dynamically render coordinates on visual edges (left column and bottom row)
    const visualRow = boardFlipped ? (7 - r) : r;
    const visualCol = boardFlipped ? (7 - c) : c;
    
    if (visualCol === 0) {
      const rank = document.createElement('div');
      rank.className = 'coord coord-rank';
      rank.innerText = 8 - visualRow;
      sq.appendChild(rank);
    }
    if (visualRow === 7) {
      const file = document.createElement('div');
      file.className = 'coord coord-file';
      file.innerText = String.fromCharCode(97 + visualCol);
      sq.appendChild(file);
    }
  });


  // POST-ANIMATION: Apply FLIP
  if (lastMove) {
    const targetSq = boardEl.querySelector(`[data-square="${lastMove.to}"]`);
    const pEl = targetSq ? targetSq.querySelector('.piece') : null;
    const oldPos = piecePositions.get(lastMove.from);
    
    if (pEl && oldPos) {
      const newRect = pEl.getBoundingClientRect();
      let dx = oldPos.x - newRect.left;
      let dy = oldPos.y - newRect.top;
      
      // FIX: If the board is rotated 180deg, the local translation coordinates are inverted!
      if (boardFlipped) {
        dx = -dx;
        dy = -dy;
      }
      
      if (dx !== 0 || dy !== 0) {
        // Invert: Put the piece back where it was before the DOM update
        pEl.style.transition = 'none';
        pEl.style.zIndex = '1000';
        pEl.style.transform = `translate(${dx}px, ${dy}px)`;
        
        // Play: Smoothly transition to the destination
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            pEl.style.transition = ''; // Restore stylesheet transition
            pEl.style.transform = '';
            
            pEl.addEventListener('transitionend', () => {
              pEl.style.zIndex = '';
            }, { once: true });
          });
        });
      }
    }
  }

  if (visualGame.in_check()) {
    const kColor = visualGame.turn();
    squares.forEach(sq => {
      const r = parseInt(sq.dataset.row);
      const c = parseInt(sq.dataset.col);
      const p = b[r] ? b[r][c] : null;
      if (p && p.type === 'k' && p.color === kColor) sq.classList.add('in-check');
    });
  }

  updateCapturedPieces(b);

  const isOver = game.game_over();
  if (isOver && !isGameOverState) {
    isGameOverState = true;
    let result = "1/2-1/2";
    let reason = "Draw";
    if (game.in_checkmate()) {
      if (game.turn() === 'w') {
        result = "0-1";
        reason = "Black wins by checkmate";
      } else {
        result = "1-0";
        reason = "White wins by checkmate";
      }
    } else if (game.in_stalemate()) {
      reason = "Stalemate";
    } else if (game.in_threefold_repetition()) {
      reason = "Threefold Repetition";
    } else if (game.insufficient_material()) {
      reason = "Insufficient Material";
    }
    
    handleRemoteGameOver({ result, reason });
  }

  const btnReview = document.getElementById('btnReview');
  if (btnReview) btnReview.classList.toggle('hidden', !isGameOverState);
  
  const controls = ['btnUndo', 'btnDraw', 'btnResign'];
  controls.forEach(id => {
    const el = document.getElementById(id);
    if(el) {
      if (isGameOverState || playerRole === 'spectator') el.classList.add('hidden');
      else {
        el.classList.remove('hidden');
        if (id === 'btnUndo') { el.disabled = game.history().length === 0; el.style.opacity = el.disabled ? '0.5' : '1'; }
      }
    }
  });

  updateMoveList();
  if (gameMode !== 'online' && gameMode !== 'analysis' && gameMode !== 'idle') {
    triggerEvaluation();
  }
}

function updateCapturedPieces(boardArray) {
  const initialCounts = { p: 8, n: 2, b: 2, r: 2, q: 1 };
  const currentCounts = { w: { p:0, n:0, b:0, r:0, q:0 }, b: { p:0, n:0, b:0, r:0, q:0 } };
  
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const p = boardArray[r][c];
      if (p && p.type !== 'k') {
        currentCounts[p.color][p.type]++;
      }
    }
  }

  // Calculate captured pieces (pieces missing from board)
  const capByWhite = []; // Black pieces missing
  const capByBlack = []; // White pieces missing
  let whiteMat = 0;
  let blackMat = 0;
  const values = { p: 1, n: 3, b: 3, r: 5, q: 9 };

  for (let type in initialCounts) {
    const bMissing = Math.max(0, initialCounts[type] - currentCounts.b[type]);
    for(let i=0; i<bMissing; i++) { capByWhite.push({type: type, color: 'b'}); whiteMat += values[type]; }
    
    const wMissing = Math.max(0, initialCounts[type] - currentCounts.w[type]);
    for(let i=0; i<wMissing; i++) { capByBlack.push({type: type, color: 'w'}); blackMat += values[type]; }
  }

  // Sort pieces logically: p, n, b, r, q
  const sortOrder = { p: 1, n: 2, b: 3, r: 4, q: 5 };
  capByWhite.sort((a,b) => sortOrder[a.type] - sortOrder[b.type]);
  capByBlack.sort((a,b) => sortOrder[a.type] - sortOrder[b.type]);

  const topEl = document.getElementById('captured-top');
  const botEl = document.getElementById('captured-bottom');
  if (!topEl || !botEl) return;

  const renderCap = (arr, scoreDiff) => {
    let html = '';
    arr.forEach(p => {
      const imgKey = p.color + p.type.toUpperCase();
      if (pieceImages[imgKey]) {
        // Strip any single quotes from the data URI to prevent breaking the inline style,
        // or just use no quotes inside the url() and single quotes for the style attribute.
        const safeUrl = pieceImages[imgKey].replace(/'/g, "%27");
        html += `<div style='width:20px; height:20px; background-size:contain; background-repeat:no-repeat; background-image:url("${safeUrl}"); margin-right:-8px;'></div>`;
      }
    });
    if (scoreDiff > 0) {
      html += `<div style="margin-left: 12px; font-size: 12px; font-weight: bold; color: var(--text-secondary); line-height:20px;">+${scoreDiff}</div>`;
    }
    return html;
  };

  if (boardFlipped) {
    topEl.innerHTML = renderCap(capByWhite, whiteMat - blackMat);
    botEl.innerHTML = renderCap(capByBlack, blackMat - whiteMat);
  } else {
    topEl.innerHTML = renderCap(capByBlack, blackMat - whiteMat);
    botEl.innerHTML = renderCap(capByWhite, whiteMat - blackMat);
  }
}

// --- INTERACTION ---
function handleSquareClick(e) {
  if (e.button === 2) return; 
  e.stopPropagation();
  clearSVG();
  
  if (isGameOverState) return;
  if (gameMode === 'analysis' || playerRole === 'spectator') return;

  if (isReviewing) {
    isReviewing = false;
    visualGame = game;
    updateBoard();
  }
  if ((connectionStatus !== 'green' || isGamePaused) && gameMode === 'online') return;
  
  const sq = e.currentTarget.dataset.square;
  const p = game.get(sq);
  const isOpponentTurn = ((gameMode === 'online' || gameMode === 'ai') && game.turn() !== playerColor);

  // Clear premove if clicking any square while one exists
  if (pendingPremove) {
    pendingPremove = null;
    updateBoard();
    return;
  }

  if (isOpponentTurn) {
    if (!premoveToggle || !premoveToggle.checked) return;
    
    if (selectedSquare) {
      if (selectedSquare === sq) {
        selectedSquare = null;
      } else {
        pendingPremove = { from: selectedSquare, to: sq };
        selectedSquare = null;
      }
      updateBoard();
    } else {
      if (p && p.color === playerColor) {
        selectedSquare = sq;
        highlightSquare(sq);
      }
    }
    return;
  }

  // Normal turn logic
  if (selectedSquare) {
    attemptMove(selectedSquare, sq);
    selectedSquare = null;
    clearHighlights();
  } else {
    if (p && p.color === game.turn()) {
      selectedSquare = sq;
      highlightSquare(sq);
      highlightLegalMoves(sq);
    }
  }
}

function handleDragStart(e) {
  if (isGameOverState) { e.preventDefault(); return; }
  if (gameMode === 'analysis' || playerRole === 'spectator') { e.preventDefault(); return; }
  
  if (isReviewing) {
    isReviewing = false;
    visualGame = game;
    updateBoard();
  }
  
  if ((connectionStatus !== 'green' || isGamePaused) && gameMode === 'online') {
    e.preventDefault();
    return;
  }

  const sq = e.target.dataset.square;
  const p = game.get(sq);
  const isOpponentTurn = ((gameMode === 'online' || gameMode === 'ai') && game.turn() !== playerColor);

  if (isOpponentTurn) {
    if (!premoveToggle || !premoveToggle.checked || (p && p.color !== playerColor)) {
      e.preventDefault();
      return;
    }
  } else {
    pendingPremove = null;
    if (p && p.color !== game.turn()) {
      e.preventDefault();
      return;
    }
  }
  
  selectedSquare = sq;
  e.dataTransfer.setData('text/plain', selectedSquare);
  // FIX: Show legal move hints and highlight square when starting a drag
  highlightSquare(sq);
  highlightLegalMoves(sq);
  // Clear SVG immediately on drag to prevent visual clutter
  clearSVG();
}

function handleDragEnd(e) {
  clearHighlights();
}

function handleDrop(e) {
  e.preventDefault();
  if (playerRole === 'spectator') return;
  const from = e.dataTransfer.getData('text/plain');
  let target = e.target;
  if (target.classList.contains('piece')) target = target.parentElement;
  const to = target.dataset.square;
  
  const isOpponentTurn = ((gameMode === 'online' || gameMode === 'ai') && game.turn() !== playerColor);
  if (isOpponentTurn && premoveToggle.checked) {
    pendingPremove = { from, to };
    updateBoard();
    return;
  }

  if (from && to) attemptMove(from, to);
  selectedSquare = null;
  clearHighlights();
}

function attemptMove(from, to, promo = null) {
  if (isGameOverState) return;
  document.getElementById('takeback-toast').classList.add('hidden');
  const drToast = document.getElementById('draw-toast');
  if (!drToast.classList.contains('hidden')) {
    drToast.classList.add('hidden');
    if (gameMode === 'online') google.script.run.resolveDraw(roomId, false);
  }
  
  if (gameMode !== 'local' && game.turn() !== playerColor) return;

  const moves = game.moves({ verbose: true });
  const move = moves.find(m => m.from === from && m.to === to);
  
  if (move) {
    if (move.flags.includes('p') && !promo) {
      pendingMove = { from, to };
      showPromotionDialog();
      return;
    }
    
    previousFen = game.fen();
    game.move({ from, to, promotion: promo || 'q' });
    
    const isCapture = move.flags.includes('c') || move.flags.includes('e');
    if (game.in_check()) AudioController.play('check');
    else if (isCapture) AudioController.play('capture');
    else AudioController.play('move');
    
    updateBoard();
    
    if (gameMode === 'online') {
      isWaitingForServer = true;
      google.script.run
        .withSuccessHandler(res => { 
           isWaitingForServer = false;
           if (res && !res.success) errorCallback(res.error); 
        })
        .withFailureHandler((err) => {
           isWaitingForServer = false;
           errorCallback(err);
        })
        .makeMove(roomId, game.fen(), game.pgn(), game.game_over(), game.history().length, playerColor);
    } else if (gameMode === 'ai' && !game.game_over()) {
      setTimeout(makeAIMove, 250);
    } else if (gameMode === 'puzzle' && typeof handlePuzzleMove === 'function') {
      handlePuzzleMove(move);
    }
    if (game.game_over()) AudioController.play('gameEnd');
  } else {
    const fromEl = boardEl.querySelector(`[data-square="${from}"] .piece`);
    if (fromEl) { fromEl.classList.add('shake'); setTimeout(() => fromEl.classList.remove('shake'), 400); }
  }
  selectedSquare = null;
  clearHighlights();
}

let resignStep = 0;

function handleResign() {
  const btn = document.getElementById('btnResign');
  if (!btn || playerRole === 'spectator') return;
  
  if (resignStep === 0) {
    btn.innerText = "Sure?";
    btn.style.background = "#fa412d";
    resignStep = 1;
    setTimeout(() => { 
      btn.innerText = "🏳 Resign"; 
      btn.style.background = ""; 
      resignStep = 0; 
    }, 3000);
  } else {
    btn.innerText = "🏳 Resign";
    btn.style.background = "";
    resignStep = 0;
    
    if (gameMode === 'online') {
      google.script.run
        .withSuccessHandler(() => { console.log("Resigned successfully"); })
        .resignGame(roomId, playerColor);
    } else {
      handleRemoteGameOver({ 
        result: playerColor === 'w' ? '0-1' : '1-0', 
        reason: (playerColor === 'w' ? 'White' : 'Black') + " resigned" 
      });
    }
  }
}

// [Helper Functions for SVG, UI, Promotion, AI...]
function getSquareCenter(sq) {
  const el = boardEl.querySelector(`[data-square="${sq}"]`);
  if (!el) return { x: 0, y: 0 };
  const rect = el.getBoundingClientRect();
  const boardRect = boardEl.getBoundingClientRect();
  return { x: (rect.left - boardRect.left) + rect.width / 2, y: (rect.top - boardRect.top) + rect.height / 2 };
}
function drawCircle(sq) {
  const center = getSquareCenter(sq);
  const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  circle.setAttribute("cx", center.x); circle.setAttribute("cy", center.y); circle.setAttribute("r", "40%");
  circle.setAttribute("fill", "none"); circle.setAttribute("stroke", "#f23c32"); circle.setAttribute("stroke-width", "4"); circle.setAttribute("opacity", "0.7");
  svgLayer.appendChild(circle);
}
function drawArrow(from, to) {
  const start = getSquareCenter(from);
  const end = getSquareCenter(to);
  
  // Calculate square-based distances to detect Knight moves
  const startCol = from.charCodeAt(0) - 97;
  const startRow = parseInt(from[1]) - 1;
  const endCol = to.charCodeAt(0) - 97;
  const endRow = parseInt(to[1]) - 1;
  
  const dCol = Math.abs(startCol - endCol);
  const dRow = Math.abs(startRow - endRow);
  
  const isKnightMove = (dCol === 1 && dRow === 2) || (dCol === 2 && dRow === 1);
  
  if (isKnightMove) {
    // Calculate elbow: Move 2 squares orthogonally then 1 square
    let elbow;
    if (dCol === 2) {
      // 2 squares sideways, 1 square up/down
      elbow = { x: end.x, y: start.y };
    } else {
      // 2 squares up/down, 1 square sideways
      elbow = { x: start.x, y: end.y };
    }
    
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    const d = `M ${start.x} ${start.y} L ${elbow.x} ${elbow.y} L ${end.x} ${end.y}`;
    path.setAttribute("d", d);
    path.setAttribute("fill", "none");
    path.setAttribute("stroke", "#f29828");
    path.setAttribute("stroke-width", "8");
    path.setAttribute("opacity", "0.7");
    path.setAttribute("stroke-linecap", "round");
    path.setAttribute("stroke-linejoin", "round");
    path.setAttribute("marker-end", "url(#arrowhead)");
    svgLayer.appendChild(path);
  } else {
    // Straight line for other moves
    const dx = end.x - start.x;
    const dy = end.y - start.y;
    const angle = Math.atan2(dy, dx);
    const length = Math.sqrt(dx*dx + dy*dy);
    const backOff = 15;
    const endX = start.x + Math.cos(angle) * (length - backOff);
    const endY = start.y + Math.sin(angle) * (length - backOff);
    
    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
    line.setAttribute("x1", start.x); line.setAttribute("y1", start.y); line.setAttribute("x2", endX); line.setAttribute("y2", endY);
    line.setAttribute("stroke", "#f29828"); line.setAttribute("stroke-width", "8"); line.setAttribute("opacity", "0.7"); line.setAttribute("marker-end", "url(#arrowhead)");
    svgLayer.appendChild(line);
  }
}

// Translate raw UCI (e.g. e2e4) into Chess.js SAN (e.g. e4)
function uciToSan(gameInstance, uci) {
  if (!uci) return '--';
  const temp = new Chess(gameInstance.fen());
  const moves = temp.moves({ verbose: true });
  const from = uci.substring(0, 2);
  const to = uci.substring(2, 4);
  const promotion = uci.length > 4 ? uci.charAt(4) : null;
  const matched = moves.find(m => m.from === from && m.to === to && (!promotion || m.promotion === promotion));
  return matched ? matched.san : uci;
}

// Convert Stockfish PV move array to formatted SAN string
function formatPvLine(fen, pvArray) {
  if (!pvArray || pvArray.length === 0) return '';
  const temp = new Chess(fen);
  const formatted = [];
  let moveNum = Math.floor(temp.history().length / 2) + 1;
  
  for (let uci of pvArray) {
    const from = uci.substring(0, 2);
    const to = uci.substring(2, 4);
    const promo = uci.length > 4 ? uci.charAt(4) : null;
    
    const moves = temp.moves({ verbose: true });
    const match = moves.find(m => m.from === from && m.to === to && (!promo || m.promotion === promo));
    if (match) {
      const prefix = (temp.turn() === 'w') ? `${moveNum}. ` : `${moveNum}... `;
      formatted.push(prefix + match.san);
      temp.move(match);
      if (temp.turn() === 'w') moveNum++;
    } else {
      formatted.push(uci);
      break;
    }
  }
  return formatted.join(' ');
}

// --- CHESSKIT ACCURACY & CLASSIFICATION HELPERS ---
function getPositionWinPercentage(position, fen = null) {
  const turn = (fen && fen.split(" ")[1]) || "w";
  if (position.lines && position.lines.length > 0) {
    return getLineWinPercentage(position.lines[0], turn);
  }
  return getLineWinPercentage(position, turn);
}

function getLineWinPercentage(line, turn = "w") {
  if (line.cp !== undefined && line.cp !== null) {
    let cpWhite = turn === 'b' ? -line.cp : line.cp;
    return getWinPercentageFromCp(cpWhite);
  }
  if (line.mate !== undefined && line.mate !== null) {
    let mateWhite = turn === 'b' ? -line.mate : line.mate;
    return getWinPercentageFromMate(mateWhite);
  }
  return 50;
}

function getWinPercentageFromMate(mate) {
  return mate > 0 ? 100 : 0;
}

function getWinPercentageFromCp(cp) {
  const cpCeiled = Math.min(1000, Math.max(-1000, cp));
  const MULTIPLIER = -0.00368208;
  const winChances = 2 / (1 + Math.exp(MULTIPLIER * cpCeiled)) - 1;
  return 50 + 50 * winChances;
}



function uciMoveParams(uciMove) {
  return {
    from: uciMove.slice(0, 2),
    to: uciMove.slice(2, 4),
    promotion: uciMove.slice(4, 5) || undefined,
  };
}

function getPieceValue(piece) {
  switch (piece) {
    case "p": return 1;
    case "n": return 3;
    case "b": return 3;
    case "r": return 5;
    case "q": return 9;
    default: return 0;
  }
}

function getMaterialDifference(fen) {
  const game = new Chess(fen);
  const board = game.board();
  let diff = 0;
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const square = board[r][c];
      if (square) {
        const val = getPieceValue(square.type);
        if (square.color === "w") {
          diff += val;
        } else {
          diff -= val;
        }
      }
    }
  }
  return diff;
}

function getIsPieceSacrifice(fen, playedMove, bestLinePvToPlay) {
  if (!bestLinePvToPlay || !bestLinePvToPlay.length) return false;

  const game = new Chess(fen);
  const whiteToPlay = game.turn() === "w";
  const startingMaterialDifference = getMaterialDifference(fen);

  let moves = [playedMove, ...bestLinePvToPlay];
  if (moves.length % 2 === 1) {
    moves = moves.slice(0, -1);
  }
  let nonCapturingMovesTemp = 1;

  const capturedPieces = { w: [], b: [] };
  for (const move of moves) {
    try {
      const fullMove = game.move(uciMoveParams(move));
      if (fullMove.captured) {
        capturedPieces[fullMove.color].push(fullMove.captured);
        nonCapturingMovesTemp = 1;
      } else {
        nonCapturingMovesTemp--;
        if (nonCapturingMovesTemp < 0) break;
      }
    } catch (e) {
      console.error(e);
      return false;
    }
  }

  for (const p of capturedPieces["w"].slice(0)) {
    const idx = capturedPieces["b"].indexOf(p);
    if (idx !== -1) {
      capturedPieces["b"].splice(idx, 1);
      capturedPieces["w"].splice(capturedPieces["w"].indexOf(p), 1);
    }
  }

  if (
    Math.abs(capturedPieces["w"].length - capturedPieces["b"].length) <= 1 &&
    capturedPieces["w"].concat(capturedPieces["b"]).every((p) => p === "p")
  ) {
    return false;
  }

  const endingMaterialDifference = getMaterialDifference(game.fen());
  const materialDiff = endingMaterialDifference - startingMaterialDifference;
  const materialDiffPlayerRelative = whiteToPlay ? materialDiff : -materialDiff;

  return materialDiffPlayerRelative < 0;
}

function isSimplePieceRecapture(fen, uciMoves) {
  const game = new Chess(fen);
  const moves = uciMoves.map((uciMove) => uciMoveParams(uciMove));

  if (moves[0].to !== moves[1].to) return false;

  const piece = game.get(moves[0].to);
  if (piece) return true;

  return false;
}

function isLosingOrAlternateCompletelyWinning(positionWinPercentage, lastPositionAlternativeLineWinPercentage, isWhiteMove) {
  const isLosing = isWhiteMove ? positionWinPercentage < 50 : positionWinPercentage > 50;
  const isAlternateCompletelyWinning = isWhiteMove
    ? lastPositionAlternativeLineWinPercentage > 97
    : lastPositionAlternativeLineWinPercentage < 3;

  return isLosing || isAlternateCompletelyWinning;
}

function getMovesAccuracy(movesWinPercentage) {
  const accuracies = [];
  for (let i = 1; i < movesWinPercentage.length; i++) {
    const winPercent = movesWinPercentage[i];
    const lastWinPercent = movesWinPercentage[i - 1];
    const isWhiteMove = (i - 1) % 2 === 0;
    const winDiff = isWhiteMove
      ? Math.max(0, lastWinPercent - winPercent)
      : Math.max(0, winPercent - lastWinPercent);

    const rawAccuracy =
      103.1668100711649 * Math.exp(-0.04354415386753951 * winDiff) -
      3.166924740191411;

    accuracies.push(Math.min(100, Math.max(0, rawAccuracy + 1)));
  }
  return accuracies;
}

function getAccuracyWeights(movesWinPercentage) {
  const n = movesWinPercentage.length;
  const windowSize = Math.min(8, Math.max(2, Math.ceil(n / 10)));
  const halfWindowSize = Math.round(windowSize / 2);
  const weights = [];
  
  for (let i = 1; i < n; i++) {
    let startIdx = i - halfWindowSize;
    let endIdx = i + halfWindowSize;
    let window = [];
    if (startIdx < 0) {
      window = movesWinPercentage.slice(0, windowSize);
    } else if (endIdx > n) {
      window = movesWinPercentage.slice(-windowSize);
    } else {
      window = movesWinPercentage.slice(startIdx, endIdx);
    }
    
    const std = getStandardDeviation(window);
    weights.push(Math.min(12, Math.max(0.5, std)));
  }
  return weights;
}

function getStandardDeviation(array) {
  const n = array.length;
  if (n === 0) return 0;
  const mean = array.reduce((a, b) => a + b) / n;
  return Math.sqrt(
    array.map((x) => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / n
  );
}

function getWeightedMean(array, weights) {
  let weightedSum = 0;
  let weightSum = 0;
  for (let i = 0; i < array.length; i++) {
    weightedSum += array[i] * weights[i];
    weightSum += weights[i];
  }
  return weightSum > 0 ? weightedSum / weightSum : 0;
}

function getHarmonicMean(array) {
  if (array.length === 0) return 0;
  const sum = array.reduce((acc, curr) => acc + 1 / curr, 0);
  return sum > 0 ? array.length / sum : 0;
}

function getPlayerAccuracy(movesAccuracy, weights, player) {
  const remainder = player === "white" ? 0 : 1;
  const playerAccuracies = movesAccuracy.filter((_, index) => index % 2 === remainder);
  const playerWeights = weights.filter((_, index) => index % 2 === remainder);
  
  if (playerAccuracies.length === 0) return 100;
  
  const weightedMean = getWeightedMean(playerAccuracies, playerWeights);
  const harmonicMean = getHarmonicMean(
    playerAccuracies.map((a) => Math.max(a, 10))
  );

  return (weightedMean + harmonicMean) / 2;
}

async function runFullGameAnalysis() {
  fullGameAnalysis = []; 
  const history = game.history({ verbose: true }); 
  const tempGame = new Chess(); 
  const fens = [tempGame.fen()];
  const uciMoves = [];
  
  for (let m of history) { 
    const fromStr = m.from;
    const toStr = m.to;
    const promotionStr = m.promotion || "";
    uciMoves.push(fromStr + toStr + promotionStr);
    tempGame.move(m); 
    fens.push(tempGame.fen()); 
  }
  
  let resolvedCount = 0;
  const totalCount = fens.length;
  const updateProgress = () => {
    resolvedCount++;
    const percent = Math.round((resolvedCount / totalCount) * 100);
    const bar = document.getElementById('analysis-progress-bar');
    const txt = document.getElementById('analysis-progress-text');
    if (bar) bar.style.width = percent + '%';
    if (txt) txt.innerText = `${percent}% completed (${resolvedCount} of ${totalCount} moves)`;
  };
  
  const evals = [];
  for (let i = 0; i < fens.length; i++) {
    const f = fens[i];
    const val = await new Promise(resolve => {
      const timeout = setTimeout(() => {
        updateProgress();
        resolve({ cp: 0, mate: null, lines: [], bestMove: null });
      }, 120000);
      enginePool.evaluate(f, 12, `batch_${i}`, (cp, mate, taskId, move, lastLines) => {
        clearTimeout(timeout);
        updateProgress();
        resolve({ cp, mate, lines: lastLines || [], bestMove: move });
      }, 2); // Request MultiPV = 2
    });
    evals.push(val);
  }
  const positionsWinPercentage = evals.map((val, idx) => getPositionWinPercentage(val, fens[idx]));
  const movesAccuracy = getMovesAccuracy(positionsWinPercentage);
  const weights = getAccuracyWeights(positionsWinPercentage);
  
  const accW = Math.round(getPlayerAccuracy(movesAccuracy, weights, "white"));
  const accB = Math.round(getPlayerAccuracy(movesAccuracy, weights, "black"));
  
  let tallies = { brilliant: 0, great: 0, best: 0, excellent: 0, good: 0, book: 0, forced: 0, inaccuracy: 0, mistake: 0, blunder: 0 };
  
  for (let i = 0; i < history.length; i++) {
    const prevPosition = evals[i];
    const rawPosition = evals[i+1];
    const playedMove = uciMoves[i];
    const sideToMove = fens[i].split(" ")[1];
    const isWhiteMove = sideToMove === "w";
    
    // 1. Forced check
    const prevGame = new Chess(fens[i]);
    const isForced = prevGame.moves().length === 1;
    
    let classification = "Good";
    
    if (isForced) {
      classification = "Forced";
    } else {
      const lastPositionWinPercentage = positionsWinPercentage[i];
      const positionWinPercentage = positionsWinPercentage[i+1];
      const winPercentageDiff = (positionWinPercentage - lastPositionWinPercentage) * (isWhiteMove ? 1 : -1);
      
      // 2. Opening check
      if (i < 8 && winPercentageDiff >= -2.0) {
        classification = "Book";
      } else {
        // Multi-line alternative PV check
        let lastPositionAlternativeLineWinPercentage = undefined;
        let bestLinePvToPlay = [];
        if (prevPosition.lines && prevPosition.lines.length > 0) {
          bestLinePvToPlay = prevPosition.lines[0].pv || [];
          const altLine = prevPosition.lines.find(line => line.pv && line.pv[0] !== playedMove);
          if (altLine) {
            lastPositionAlternativeLineWinPercentage = getLineWinPercentage(altLine, sideToMove);
          }
        }
        
        // 3. Splendid Move (Sacrifice)
        let isSplendid = false;
        if (lastPositionAlternativeLineWinPercentage !== undefined) {
          if (winPercentageDiff >= -2.0) {
            const isPieceSacrifice = getIsPieceSacrifice(fens[i], playedMove, bestLinePvToPlay);
            if (isPieceSacrifice && !isLosingOrAlternateCompletelyWinning(positionWinPercentage, lastPositionAlternativeLineWinPercentage, isWhiteMove)) {
              isSplendid = true;
            }
          }
        }
        
        if (isSplendid) {
          classification = "Splendid";
        } else {
          // 4. Perfect Move (Only Move / Outcome Changer)
          let isPerfect = false;
          if (lastPositionAlternativeLineWinPercentage !== undefined) {
            if (winPercentageDiff >= -2.0) {
              const fenTwoMovesAgo = i > 0 ? fens[i - 1] : null;
              const uciNextTwoMoves = i > 0 ? [uciMoves[i - 1], uciMoves[i]] : null;
              const isRecapture = fenTwoMovesAgo && uciNextTwoMoves && isSimplePieceRecapture(fenTwoMovesAgo, uciNextTwoMoves);
              
              if (!isRecapture && !isLosingOrAlternateCompletelyWinning(positionWinPercentage, lastPositionAlternativeLineWinPercentage, isWhiteMove)) {
                const hasChangedGameOutcome = winPercentageDiff > 10 && (
                  (lastPositionWinPercentage < 50 && positionWinPercentage > 50) ||
                  (lastPositionWinPercentage > 50 && positionWinPercentage < 50)
                );
                const isTheOnlyGoodMove = (positionWinPercentage - lastPositionAlternativeLineWinPercentage) * (isWhiteMove ? 1 : -1) > 10;
                
                if (hasChangedGameOutcome || isTheOnlyGoodMove) {
                  isPerfect = true;
                }
              }
            }
          }
          
          if (isPerfect) {
            classification = "Perfect";
          } else {
            // 5. Best Move
            const bestMovePlayed = bestLinePvToPlay.length > 0 && playedMove === bestLinePvToPlay[0];
            if (bestMovePlayed) {
              classification = "Best";
            } else {
              // 6. Basic Classifications
              if (winPercentageDiff < -20.0) classification = "Blunder";
              else if (winPercentageDiff < -10.0) classification = "Mistake";
              else if (winPercentageDiff < -5.0) classification = "Inaccuracy";
              else if (winPercentageDiff < -2.0) classification = "Okay";
              else classification = "Excellent";
            }
          }
        }
      }
    }
    
    // Map classification to standard badges
    let cls = "Good";
    if (classification === "Splendid") cls = "Brilliant";
    else if (classification === "Perfect") cls = "Great";
    else if (classification === "Okay") cls = "Good";
    else cls = classification; // Best, Excellent, Book, Forced, Inaccuracy, Mistake, Blunder
    
    tallies[cls.toLowerCase()]++;
    fullGameAnalysis.push({ 
      move: history[i], 
      eval: rawPosition, 
      cpl: 0, 
      classification: cls,
      bestMove: prevPosition.bestMove
    });
  }
  fullGameAnalysis.startingEval = evals[0];
  
  displayAnalysisReport(accW, accB, tallies);
  const infoEl = document.getElementById('game-info-panel');
  if (infoEl) infoEl.innerText = "Analysis Mode";
}

function displayAnalysisReport(accW, accB, t) {

  document.getElementById('white-elo').innerText = eloW;

  document.getElementById('white-acc').innerText = accW + "%"; 
  document.getElementById('black-acc').innerText = accB + "%";
  document.getElementById('white-acc-ring').style.strokeDashoffset = 226 - (226*accW)/100;
  document.getElementById('black-acc-ring').style.strokeDashoffset = 226 - (226*accB)/100;

function exitAnalysisMode() { document.getElementById('analysis-controls').classList.add('hidden'); document.getElementById('analysis-report').classList.add('hidden'); document.getElementById('main-controls').classList.remove('hidden'); openWelcomeScreen(); }

function goToAnalysisStep(index) {
  const currentHistory = (gameMode === 'analysis') ? analysisHistory : game.history({ verbose: true });
  if (index < -1 || index >= currentHistory.length) return;
  
  analysisIndex = index; 
  const tempGame = new Chess();
  for (let i = 0; i <= index; i++) {
    tempGame.move(currentHistory[i]);
  }
  visualGame = tempGame;
  updateBoard();
  
  // Clear any existing badges first
  boardEl.querySelectorAll('.badge').forEach(b => b.remove());
  
  if (index >= 0 && gameMode === 'analysis' && fullGameAnalysis[index]) {
    const m = fullGameAnalysis[index].move; 
    const cls = fullGameAnalysis[index].classification.toLowerCase();
    const toSq = boardEl.querySelector(`[data-square="${m.to}"]`);
    if (toSq) {
      const icons = { 
        brilliant: '!!', 
        great: '!', 
        best: '★', 
        excellent: '✓', 
        good: '✓', 
        book: '📖', 
        forced: '🔒',
        inaccuracy: '?!', 
        mistake: '?', 
        blunder: '??' 
      };
      const badge = document.createElement('div'); 
      badge.className = `badge badge-${cls} square-badge`; 
      badge.innerText = icons[cls] || ''; 
      toSq.appendChild(badge);
    }
  }
  // Load from pre-calculated analysis instead of starting live evaluation loop on each move again
  if (gameMode === 'analysis' && fullGameAnalysis.length > 0) {
    let cp, mate, bestMove, lines;
    if (index === -1) {
      const start = fullGameAnalysis.startingEval || { cp: 0, mate: null, bestMove: null, lines: [] };
      cp = start.cp;
      mate = start.mate;
      bestMove = start.bestMove;
      lines = start.lines;
    } else if (fullGameAnalysis[index]) {
      const item = fullGameAnalysis[index];
      cp = item.eval.cp;
      mate = item.eval.mate;
      bestMove = item.bestMove;
      lines = item.eval.lines;
    }
    
    // Update eval bar and engine UI using the cached values instantly
    updateEvalBar(cp, mate);
    updateEngineUI(cp, mate, bestMove, lines, 12);
  } else {
    triggerEvaluation(16);
  }
}

function safeAddListener(id, event, handler) {
  const el = document.getElementById(id);
  if (el) el.addEventListener(event, handler);
}

document.addEventListener('keydown', e => {
  // Ignore if user is typing in an input field
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
    
    const currentHistory = (gameMode === 'analysis') ? analysisHistory : game.history({ verbose: true });

    if (e.key === 'ArrowLeft') {
      if (gameMode !== 'analysis' && !isReviewing) {
        isReviewing = true;
        analysisIndex = currentHistory.length - 1;
      }
      if (analysisIndex > -1) {
        goToAnalysisStep(analysisIndex - 1);
      }
    } else if (e.key === 'ArrowRight') {
      if (isReviewing || gameMode === 'analysis') {
        if (analysisIndex < currentHistory.length - 1) {
          goToAnalysisStep(analysisIndex + 1);
          if (gameMode !== 'analysis' && analysisIndex === currentHistory.length - 1) {
            isReviewing = false;
            visualGame = game;
            updateBoard();
          }
        } else if (gameMode !== 'analysis') {
          isReviewing = false;
          visualGame = game;
          updateBoard();
        }
      }
    }
  }
});

  // Hook up engine depth selection change and live evaluation callback
  safeAddListener('eval-depth-select', 'change', () => triggerEvaluation());
  if (typeof enginePool !== 'undefined') {
    enginePool.onEvalResult = (cp, mate, taskId, move, rawLine) => {
      if (taskId === 'raw' && typeof rawLine === 'string') {
        const depthMatch = rawLine.match(/info depth (\d+)/);
        if (depthMatch) {
          const currentDepth = parseInt(depthMatch[1], 10);
          const depthSelectEl = document.getElementById('eval-depth-select');
          const targetDepth = depthSelectEl ? parseInt(depthSelectEl.value, 10) : 16;
          
          let scoreCp = null;
          let scoreMate = null;
          const cpMatch = rawLine.match(/score cp (-?\d+)/);
          if (cpMatch) scoreCp = parseInt(cpMatch[1], 10);
          const mateMatch = rawLine.match(/score mate (-?\d+)/);
          if (mateMatch) scoreMate = parseInt(mateMatch[1], 10);
          
          const pvMatch = rawLine.match(/ pv (.+)/);
          const pvMoveStr = pvMatch ? pvMatch[1].split(' ')[0] : null;
          const pvArray = pvMatch ? pvMatch[1].split(' ') : [];

        }
      }
    };
  }
  safeAddListener('btnUndo', 'click', () => {
    if (playerRole === 'spectator') return;

      const btn = document.getElementById('btnUndo');

});

function getSquareFromEvent(e) {
  const rect = boardEl.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const col = Math.floor((x / rect.width) * 8);
  const row = Math.floor((y / rect.height) * 8);
  if (col < 0 || col > 7 || row < 0 || row > 7) return null;
  const c = boardFlipped ? (7 - col) : col;
  const r = boardFlipped ? (7 - row) : row;
  return String.fromCharCode(97 + c) + (8 - r);
}
