<script>
class EnginePool {
  constructor() {
    this.poolSize = Math.min(2, navigator.hardwareConcurrency || 2);
    this.workers = [];
    this.taskQueue = [];
    this.onPuzzleFound = null;
    this.onEvalResult = null;
    this.callbacks = new Map(); 
    this.isGenerating = false;
    this.isInitialized = false;
  }

  initPool() {
    if (this.isInitialized) return;
    try {
      const chessCode = document.getElementById('chess-engine').textContent;
      const stockfishCode = document.getElementById('stockfish-engine').textContent;

      if (!chessCode || !stockfishCode) {
        console.error("CRITICAL: Chess or Stockfish source missing!");
        return;
      }

      // --- WORKER BOOTSTRAP ---
      // We define the Module hooks BEFORE the engine script runs
      const workerLogicPrefix = `
        self.game = null;
        self.state = 'IDLE'; 
        self.solutionMoves = [];
        self.initialFen = '';
        self.extractionDepth = 0;
        self.lastEval = 0;
        self.mateEval = null;
        self.currentTaskId = null;
        self.engineReady = false;

        self.Module = {
          print: function(line) {
            if (typeof line === 'string') {
               processEngineLine(line);
            }
            // Send raw line for evaluation bar
            self.postMessage({ type: 'RAW_OUTPUT', data: line });
          },
          onRuntimeInitialized: function() {
            self.engineReady = true;
            // Kickstart UCI
            self.postMessage('uci');
            self.postMessage('isready');
          }
        };

        function processEngineLine(line) {
          if (self.state === 'LIVE_EVAL' || self.state === 'BATCH_EVAL') {
            if (line.startsWith('info depth')) {
              const cpMatch = line.match(/score cp (-?\\d+)/);
              if (cpMatch) { self.lastEval = parseInt(cpMatch[1]); self.mateEval = null; }
              const mateMatch = line.match(/score mate (-?\\d+)/);
              if (mateMatch) { self.mateEval = parseInt(mateMatch[1]); self.lastEval = self.mateEval > 0 ? 10000 : -10000; }
            }
            if (line.startsWith('bestmove')) {
               const parts = line.split(' ');
               const bestMove = (parts.length > 1 && parts[1] !== '(none)') ? parts[1] : null;
               self.postMessage({ type: 'EVAL_RESULT_WRAPPED', cp: self.lastEval, mate: self.mateEval, taskId: self.currentTaskId, bestMove: bestMove });
               self.state = 'IDLE';
            }
          } else if (self.state === 'EVAL_INITIAL') {
            if (line.startsWith('info depth')) {
              const match = line.match(/score cp (-?\\d+)/);
              if (match) self.lastEval = parseInt(match[1]);
              const mateMatch = line.match(/score mate (-?\\d+)/);
              if (mateMatch) self.lastEval = parseInt(mateMatch[1]) > 0 ? 10000 : -10000;
            }
            if (line.startsWith('bestmove')) {
              if (Math.abs(self.lastEval) > 400 || Math.abs(self.lastEval) === 10000) {
                 const parts = line.split(' ');
                 if(parts.length > 1 && parts[1] !== '(none)') {
                   self.solutionMoves.push(parts[1]);
                   self.game.move(parts[1], {sloppy: true});
                   self.extractionDepth = 1;
                   self.state = 'EXTRACT_RESPONSE';
                   self.postMessage('position fen ' + self.game.fen());
                   self.postMessage('go depth 10');
                   return;
                 }
              }
              startGeneration();
            }
          } else if (self.state === 'EXTRACT_RESPONSE' || self.state === 'EXTRACT_MOVE') {
              if (line.startsWith('bestmove')) {
                 const parts = line.split(' ');
                 if(parts.length > 1 && parts[1] !== '(none)') {
                   self.solutionMoves.push(parts[1]);
                   self.game.move(parts[1], {sloppy: true});
                   if (self.extractionDepth < 3 && !self.game.game_over()) {
                      self.extractionDepth++;
                      self.state = self.state === 'EXTRACT_RESPONSE' ? 'EXTRACT_MOVE' : 'EXTRACT_RESPONSE';
                      self.postMessage('position fen ' + self.game.fen());
                      self.postMessage('go depth 10');
                      return;
                   }
                 }
                 if (self.solutionMoves.length >= 2) {
                    self.postMessage({ type: 'PUZZLE_FOUND_WRAPPED', fen: self.initialFen, solution: self.solutionMoves });
                 } else {
                    startGeneration();
                    return;
                 }
                 self.state = 'IDLE';
              }
          }
        }

        function generateRandomGame() {
          self.game.reset();
          const numMoves = 10 + Math.floor(Math.random() * 15);
          for(let i=0; i<numMoves; i++) {
            if(self.game.game_over()) break;
            const moves = self.game.moves();
            if(moves.length === 0) break;
            self.game.move(moves[Math.floor(Math.random() * moves.length)]);
          }
          return self.game.fen();
        }

        function startGeneration() {
          if (!self.game) self.game = new Chess();
          self.solutionMoves = [];
          self.initialFen = generateRandomGame();
          self.state = 'EVAL_INITIAL';
          self.postMessage('position fen ' + self.initialFen);
          self.postMessage('go depth 10');
        }

        // We listen for messages using addEventListener to avoid being overwritten
        self.addEventListener('message', function(e) {
          if (!e.data) return;
          if (e.data.type === 'GENERATE_PUZZLE') {
            startGeneration();
          } else if (e.data.type === 'EVAL_EVALUATE' || e.data.type === 'BATCH_TASK') {
            self.state = e.data.type === 'EVAL_EVALUATE' ? 'LIVE_EVAL' : 'BATCH_EVAL';
            self.currentTaskId = e.data.taskId || null;
            self.lastEval = 0; self.mateEval = null;
            self.postMessage('stop');
            self.postMessage('position fen ' + e.data.fen);
            self.postMessage('go depth ' + (e.data.depth || 12));
          }
        });
      `;

      const blob = new Blob([workerLogicPrefix, "\n", chessCode, "\n", stockfishCode], { type: 'application/javascript' });
      const blobUrl = URL.createObjectURL(blob);

      for (let i = 0; i < this.poolSize; i++) {
        const worker = new Worker(blobUrl);
        worker.isBusy = false;
        worker.onmessage = (e) => this.handleWorkerMessage(worker, e);
        worker.onerror = (err) => console.error("Worker Error:", err);
        this.workers.push(worker);
      }
      this.isInitialized = true;
    } catch (e) {
      console.error("EnginePool Init Failed:", e);
    }
  }

  handleWorkerMessage(worker, e) {
    const data = e.data;
    if (!data) return;

    if (data.type === 'PUZZLE_FOUND_WRAPPED') {
      if (this.onPuzzleFound) this.onPuzzleFound(data.fen, data.solution);
      worker.isBusy = false;
      this.isGenerating = false;
      this.processQueue();
    } else if (data.type === 'EVAL_RESULT_WRAPPED') {
      const { cp, mate, taskId, bestMove } = data;
      if (taskId && this.callbacks.has(taskId)) {
        this.callbacks.get(taskId)(cp, mate, taskId, bestMove);
        this.callbacks.delete(taskId);
      } else if (this.onEvalResult) {
        this.onEvalResult(cp, mate, taskId, bestMove);
      }
      worker.isBusy = false;
      this.processQueue();
    } else if (data.type === 'RAW_OUTPUT' && typeof data.data === 'string') {
      if (this.onEvalResult) this.onEvalResult(null, null, 'raw', null, data.data);
    }
  }

  processQueue() {
    if (this.taskQueue.length === 0) return;
    const idleWorker = this.workers.find(w => !w.isBusy);
    if (idleWorker) {
      const task = this.taskQueue.shift();
      idleWorker.isBusy = true;
      idleWorker.postMessage(task);
    }
  }

  generate() {
    this.initPool();
    this.isGenerating = true;
    this.taskQueue.push({ type: 'GENERATE_PUZZLE' });
    this.processQueue();
  }

  evaluate(fen, depth = 12, taskId = null, callback = null) {
    this.initPool();
    if (callback && taskId) this.callbacks.set(taskId, callback);
    const task = { type: (taskId === 'live' ? 'EVAL_EVALUATE' : 'BATCH_TASK'), fen, depth, taskId };
    if (taskId === 'live' || taskId === 'ai_move') {
      this.taskQueue = this.taskQueue.filter(t => t.taskId !== taskId);
      this.taskQueue.unshift(task);
    } else {
      this.taskQueue.push(task);
    }
    this.processQueue();
  }
}

// UI Integration
const enginePool = new EnginePool();
let puzzleSolution = [];
let currentPuzzleStep = 0;
let puzzleBuffer = [];

// Pre-warm the buffer
setTimeout(() => {
  enginePool.onPuzzleFound = (fen, solution) => {
    puzzleBuffer.push({ fen, solution });
    if (puzzleBuffer.length < 3) enginePool.generate();
  };
  enginePool.generate();
}, 4000);

function startOfflinePuzzle() {
  if (typeof isGamePaused !== 'undefined') isGamePaused = false;
  
  if (puzzleBuffer.length > 0) {
    const p = puzzleBuffer.shift();
    loadPuzzleData(p.fen, p.solution);
    enginePool.onPuzzleFound = (f, s) => { 
      puzzleBuffer.push({ fen: f, solution: s }); 
      if (puzzleBuffer.length < 3) enginePool.generate();
    };
    if (!enginePool.isGenerating) enginePool.generate();
  } else {
    const btn = document.getElementById('btn-generate-puzzle');
    if (btn) btn.innerText = "⏳ Generating...";
    enginePool.onPuzzleFound = (fen, solution) => {
      if (btn) btn.innerText = "🧩 Puzzles";
      loadPuzzleData(fen, solution);
      enginePool.onPuzzleFound = (f, s) => { 
        puzzleBuffer.push({ fen: f, solution: s }); 
        if (puzzleBuffer.length < 3) enginePool.generate();
      };
      if (!enginePool.isGenerating) enginePool.generate();
    };
    if (!enginePool.isGenerating) enginePool.generate();
  }
}

function loadPuzzleData(fen, solution) {
  closeWelcomeScreen();
  gameMode = 'puzzle';
  puzzleSolution = solution; 
  currentPuzzleStep = 0;
  game.load(fen);
  playerColor = game.turn();
  boardFlipped = (playerColor === 'b');
  updateBoard();
  triggerEvaluation(14);
  const infoEl = document.getElementById('game-info-panel');
  if (infoEl) infoEl.innerText = "Puzzle: Find the best move!";
}

function handlePuzzleMove(move) {
  const expectedMove = puzzleSolution[currentPuzzleStep];
  const userMoveStr = move.from + move.to + (move.promotion || '');
  
  if (userMoveStr === expectedMove || expectedMove === (move.from + move.to)) {
    currentPuzzleStep++;
    if (currentPuzzleStep >= puzzleSolution.length) {
      const infoEl = document.getElementById('game-info-panel');
      if (infoEl) infoEl.innerText = "Solved! Next puzzle...";
      setTimeout(() => startOfflinePuzzle(), 1000);
    } else {
      setTimeout(() => {
        const replyMove = puzzleSolution[currentPuzzleStep];
        game.move(replyMove, { sloppy: true });
        updateBoard();
        if (typeof AudioController !== 'undefined') AudioController.play('move');
        currentPuzzleStep++;
        if (currentPuzzleStep >= puzzleSolution.length) {
          const infoEl = document.getElementById('game-info-panel');
          if (infoEl) infoEl.innerText = "Solved! Next puzzle...";
          setTimeout(() => startOfflinePuzzle(), 1000);
        }
      }, 500);
    }
  } else {
    game.undo();
    updateBoard();
    if (boardEl) {
      const fromEl = boardEl.querySelector(`[data-square="${move.from}"] .piece`);
      if (fromEl) { fromEl.classList.add('shake'); setTimeout(() => fromEl.classList.remove('shake'), 400); }
    }
    const infoEl = document.getElementById('game-info-panel');
    if (infoEl) infoEl.innerText = "Incorrect move, try again.";
  }
}
</script>
