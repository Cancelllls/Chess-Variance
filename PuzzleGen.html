<script>
class EnginePool {
  constructor() {
    this.poolSize = Math.min(2, navigator.hardwareConcurrency || 2);
    this.workers = [];
    this.taskQueue = [];
    this.callbacks = new Map(); // Map taskId -> callback
    this.onPuzzleFound = null; // Legacy support
    this.onEvalResult = null;  // Legacy support
    this.isInitialized = false;
    this.isGenerating = false;
  }

  initPool() {
    if (this.isInitialized) return;
    try {
      const stockfishCode = document.getElementById('stockfish-engine').textContent;
      if (!stockfishCode) throw new Error("Stockfish source missing");

      const blob = new Blob([stockfishCode], { type: 'application/javascript' });
      const blobUrl = URL.createObjectURL(blob);

      for (let i = 0; i < this.poolSize; i++) {
        const worker = new Worker(blobUrl);
        worker.isBusy = false;
        worker.currentTask = null;
        worker.lastCp = 0;
        worker.lastMate = null;

        worker.onmessage = (e) => {
          const line = e.data;
          if (typeof line !== 'string') return;

          // Parse Evaluation
          if (line.startsWith('info depth')) {
            const cpMatch = line.match(/score cp (-?\\d+)/);
            if (cpMatch) { worker.lastCp = parseInt(cpMatch[1]); worker.lastMate = null; }
            const mateMatch = line.match(/score mate (-?\\d+)/);
            if (mateMatch) { worker.lastMate = parseInt(mateMatch[1]); worker.lastCp = worker.lastMate > 0 ? 10000 : -10000; }
          }

          // Parse Best Move
          if (line.startsWith('bestmove')) {
            const move = line.split(' ')[1];
            if (worker.currentTask) {
              const { taskId, callback } = worker.currentTask;
              if (callback) callback(worker.lastCp, worker.lastMate, taskId, move);
              else if (this.callbacks.has(taskId)) {
                this.callbacks.get(taskId)(worker.lastCp, worker.lastMate, taskId, move);
                this.callbacks.delete(taskId);
              } else if (this.onEvalResult) {
                this.onEvalResult(worker.lastCp, worker.lastMate, taskId, move);
              }
            }
            worker.isBusy = false;
            worker.currentTask = null;
            this.processQueue();
          }

          // Raw output for live eval bar
          if (this.onEvalResult && worker.currentTask?.taskId === 'live') {
            this.onEvalResult(null, null, 'raw', null, line);
          }
        };

        worker.postMessage('uci');
        worker.postMessage('isready');
        this.workers.push(worker);
      }
      this.isInitialized = true;
      console.log("AI Engine Pool Ready");
    } catch (e) {
      console.error("EnginePool Init Failed:", e);
    }
  }

  processQueue() {
    if (this.taskQueue.length === 0) return;
    const idleWorker = this.workers.find(w => !w.isBusy);
    if (idleWorker) {
      const task = this.taskQueue.shift();
      idleWorker.isBusy = true;
      idleWorker.currentTask = task;
      idleWorker.lastCp = 0;
      idleWorker.lastMate = null;
      idleWorker.postMessage('stop');
      idleWorker.postMessage('position fen ' + task.fen);
      idleWorker.postMessage('go depth ' + task.depth);
    }
  }

  evaluate(fen, depth = 10, taskId = null, callback = null) {
    this.initPool();
    const task = { fen, depth, taskId, callback };
    if (taskId === 'live' || taskId === 'ai_move') {
      this.taskQueue = this.taskQueue.filter(t => t.taskId !== taskId);
      this.taskQueue.unshift(task);
    } else {
      this.taskQueue.push(task);
    }
    this.processQueue();
  }

  // --- FASTER PUZZLE GENERATION ---
  async generate() {
    this.isGenerating = true;
    const tempGame = new Chess();
    
    // Play a random opening
    const plies = 10 + Math.floor(Math.random() * 15);
    for(let i=0; i<plies; i++) {
       const moves = tempGame.moves();
       if (moves.length === 0) break;
       tempGame.move(moves[Math.floor(Math.random() * moves.length)]);
    }

    const findTacticalLine = (fen) => {
      return new Promise(resolve => {
        this.evaluate(fen, 10, 'gen_puzzle', (cp, mate, tid, move) => {
          if (Math.abs(cp) > 350 || mate !== null) {
            // Found a winning position, now extract 3 plies
            const solution = [move];
            const p2Game = new Chess(fen);
            p2Game.move(move);
            const fen2 = p2Game.fen();
            
            this.evaluate(fen2, 10, 'gen_puzzle_step2', (cp2, mate2, tid2, move2) => {
               if (move2) {
                 solution.push(move2);
                 p2Game.move(move2);
                 this.evaluate(p2Game.fen(), 10, 'gen_puzzle_step3', (cp3, mate3, tid3, move3) => {
                   if (move3) solution.push(move3);
                   resolve({ fen, solution });
                 });
               } else resolve(null);
            });
          } else resolve(null);
        });
      });
    };

    let result = await findTacticalLine(tempGame.fen());
    if (!result) {
       // Try again after a short delay to keep UI responsive
       setTimeout(() => this.generate(), 50);
       return;
    }

    if (this.onPuzzleFound) this.onPuzzleFound(result.fen, result.solution);
    this.isGenerating = false;
  }
}

// UI Integration
const enginePool = new EnginePool();
let puzzleSolution = [];
let currentPuzzleStep = 0;
let puzzleBuffer = [];

// Pre-warm the buffer
setTimeout(() => {
  enginePool.onPuzzleFound = (fen, solution) => {
    puzzleBuffer.push({ fen, solution });
    if (puzzleBuffer.length < 3) enginePool.generate();
  };
  enginePool.generate();
}, 2000);

function startOfflinePuzzle() {
  if (typeof isGamePaused !== 'undefined') isGamePaused = false;
  
  if (puzzleBuffer.length > 0) {
    const p = puzzleBuffer.shift();
    loadPuzzleData(p.fen, p.solution);
    enginePool.onPuzzleFound = (f, s) => { 
      puzzleBuffer.push({ fen: f, solution: s }); 
      if (puzzleBuffer.length < 3) enginePool.generate();
    };
    if (!enginePool.isGenerating) enginePool.generate();
  } else {
    const btn = document.getElementById('btn-generate-puzzle');
    if (btn) btn.innerText = "⏳ Generating...";
    enginePool.onPuzzleFound = (fen, solution) => {
      if (btn) btn.innerText = "🧩 Puzzles";
      loadPuzzleData(fen, solution);
      enginePool.onPuzzleFound = (f, s) => { 
        puzzleBuffer.push({ fen: f, solution: s }); 
        if (puzzleBuffer.length < 3) enginePool.generate();
      };
      if (!enginePool.isGenerating) enginePool.generate();
    };
    if (!enginePool.isGenerating) enginePool.generate();
  }
}

function loadPuzzleData(fen, solution) {
  closeWelcomeScreen();
  gameMode = 'puzzle';
  puzzleSolution = solution; 
  currentPuzzleStep = 0;
  game.load(fen);
  playerColor = game.turn();
  boardFlipped = (playerColor === 'b');
  updateBoard();
  triggerEvaluation(12);
  const infoEl = document.getElementById('game-info-panel');
  if (infoEl) infoEl.innerText = "Puzzle: Find the best move!";
}

function handlePuzzleMove(move) {
  const expectedMove = puzzleSolution[currentPuzzleStep];
  const userMoveStr = move.from + move.to + (move.promotion || '');
  
  if (userMoveStr === expectedMove || expectedMove === (move.from + move.to)) {
    currentPuzzleStep++;
    if (currentPuzzleStep >= puzzleSolution.length) {
      const infoEl = document.getElementById('game-info-panel');
      if (infoEl) infoEl.innerText = "Solved! Next puzzle...";
      setTimeout(() => startOfflinePuzzle(), 1000);
    } else {
      setTimeout(() => {
        const replyMove = puzzleSolution[currentPuzzleStep];
        game.move(replyMove, { sloppy: true });
        updateBoard();
        if (typeof AudioController !== 'undefined') AudioController.play('move');
        currentPuzzleStep++;
        if (currentPuzzleStep >= puzzleSolution.length) {
          const infoEl = document.getElementById('game-info-panel');
          if (infoEl) infoEl.innerText = "Solved! Next puzzle...";
          setTimeout(() => startOfflinePuzzle(), 1000);
        }
      }, 500);
    }
  } else {
    game.undo();
    updateBoard();
    if (boardEl) {
      const fromEl = boardEl.querySelector(`[data-square="${move.from}"] .piece`);
      if (fromEl) { fromEl.classList.add('shake'); setTimeout(() => fromEl.classList.remove('shake'), 400); }
    }
    const infoEl = document.getElementById('game-info-panel');
    if (infoEl) infoEl.innerText = "Incorrect move, try again.";
  }
}
</script>
