<script>
class EnginePool {
  constructor() {
    this.poolSize = Math.min(2, navigator.hardwareConcurrency || 2);
    this.workers = [];
    this.taskQueue = [];
    this.callbacks = new Map(); 
    this.onPuzzleFound = null; 
    this.onEvalResult = null;  
    this.isInitialized = false;
    this.isGenerating = false;
  }

  initPool() {
    if (this.isInitialized) return;
    try {
      const stockfishCode = document.getElementById('stockfish-engine').textContent;
      if (!stockfishCode) throw new Error("Stockfish source missing");

      const blob = new Blob([stockfishCode], { type: 'application/javascript' });
      const blobUrl = URL.createObjectURL(blob);

      for (let i = 0; i < this.poolSize; i++) {
        const worker = new Worker(blobUrl);
        worker.isBusy = false;
        worker.currentTask = null;
        worker.lastCp = 0;
        worker.lastMate = null;

        worker.onmessage = (e) => {
          const line = e.data;
          if (typeof line !== 'string') return;

          if (line.startsWith('info depth')) {
            const cpMatch = line.match(/score cp (-?\d+)/);
            if (cpMatch) { worker.lastCp = parseInt(cpMatch[1]); worker.lastMate = null; }
            const mateMatch = line.match(/score mate (-?\d+)/);
            if (mateMatch) { worker.lastMate = parseInt(mateMatch[1]); worker.lastCp = worker.lastMate > 0 ? 10000 : -10000; }
          }

          if (line.startsWith('bestmove')) {
            const move = line.split(' ')[1];
            if (worker.currentTask) {
              const { taskId, callback } = worker.currentTask;
              if (callback) callback(worker.lastCp, worker.lastMate, taskId, move);
              else if (this.callbacks.has(taskId)) {
                this.callbacks.get(taskId)(worker.lastCp, worker.lastMate, taskId, move);
                this.callbacks.delete(taskId);
              } else if (this.onEvalResult) {
                this.onEvalResult(worker.lastCp, worker.lastMate, taskId, move);
              }
            }
            worker.isBusy = false;
            worker.currentTask = null;
            this.processQueue();
          }

          if (this.onEvalResult && worker.currentTask?.taskId === 'live') {
            this.onEvalResult(null, null, 'raw', null, line);
          }
        };

        worker.postMessage('uci');
        worker.postMessage('isready');
        this.workers.push(worker);
      }
      this.isInitialized = true;
      console.log("AI Engine Pool Ready");
    } catch (e) {
      console.error("EnginePool Init Failed:", e);
    }
  }

  processQueue() {
    if (this.taskQueue.length === 0) return;
    const idleWorker = this.workers.find(w => !w.isBusy);
    if (idleWorker) {
      const task = this.taskQueue.shift();
      idleWorker.isBusy = true;
      idleWorker.currentTask = task;
      idleWorker.lastCp = 0;
      idleWorker.lastMate = null;
      idleWorker.postMessage('stop');
      idleWorker.postMessage('position fen ' + task.fen);
      idleWorker.postMessage('go depth ' + task.depth);
    }
  }

  evaluate(fen, depth = 10, taskId = null, callback = null) {
    this.initPool();
    const task = { fen, depth, taskId, callback };
    if (taskId === 'live' || taskId === 'ai_move') {
      this.taskQueue = this.taskQueue.filter(t => t.taskId !== taskId);
      this.taskQueue.unshift(task);
    } else {
      this.taskQueue.push(task);
    }
    this.processQueue();
  }

  async generate() {
    if (this.isGenerating) return;
    this.isGenerating = true;
    const tempGame = new Chess();
    const plies = 10 + Math.floor(Math.random() * 15);
    for(let i=0; i<plies; i++) {
       const moves = tempGame.moves();
       if (moves.length === 0) break;
       tempGame.move(moves[Math.floor(Math.random() * moves.length)]);
    }

    const findTacticalLine = (fen) => {
      return new Promise(resolve => {
        this.evaluate(fen, 10, 'gen_puzzle', (cp, mate, tid, move) => {
          if (Math.abs(cp) > 300 || mate !== null) {
            const solution = [move];
            const p2Game = new Chess(fen);
            p2Game.move(move);
            this.evaluate(p2Game.fen(), 10, 'gen_puzzle_s2', (cp2, mate2, tid2, move2) => {
               if (move2) {
                 solution.push(move2);
                 p2Game.move(move2);
                 this.evaluate(p2Game.fen(), 10, 'gen_puzzle_s3', (cp3, mate3, tid3, move3) => {
                   if (move3) solution.push(move3);
                   resolve({ fen, solution });
                 });
               } else resolve(null);
            });
          } else resolve(null);
        });
      });
    };

    let result = await findTacticalLine(tempGame.fen());
    if (!result) {
       setTimeout(() => { this.isGenerating = false; this.generate(); }, 200);
       return;
    }

    if (this.onPuzzleFound) this.onPuzzleFound(result.fen, result.solution);
    this.isGenerating = false;
  }
}

const PUZZLE_SEED = [

  { diff: 1, desc: "Checkmate in 1 (White)", fen: "4r1k1/1p3ppp/p7/3p4/8/1P3P2/P1q3PP/4R1K1 w - - 0 1", solution: ["e1e8"] },
  { diff: 1, desc: "Checkmate in 1 (White)", fen: "4r1k1/5ppp/8/8/8/8/5PPP/4R1K1 w - - 0 1", solution: ["e1e8"] },
  { diff: 1, desc: "Find the best move for White", fen: "2kr3r/ppp2ppp/2n2n2/3q4/3P2b1/2P2N2/P3BPPP/R1BQ1RK1 w - - 1 11", solution: ["h2h3", "g4h5", "c1e3"] },
  // Medium (2-3 move tactics)
  { diff: 2, desc: "Win material for White", fen: "rn1qkbnr/ppp2ppp/3p4/4p3/2B1P1b1/5N2/PPPP1PPP/RNBQK2R w KQkq - 2 4", solution: ["c4f7", "e8f7", "f3e5"] },
  { diff: 2, desc: "Find the tactical sequence", fen: "r1bqk1nr/pppp1ppp/2n5/2b1p3/2B1P3/5N2/PPPP1PPP/RNBQK2R w KQkq - 4 4", solution: ["c4f7", "e8f7", "f3e5"] },
  { diff: 2, desc: "Win the Queen", fen: "r1b1k2r/pppp1ppp/8/4P3/1b1Q4/2N5/PPP1BPPP/R1B1K2R b KQkq - 0 8", solution: ["c7c5", "d4b4", "c5b4"] },
  { diff: 2, desc: "Checkmate sequence for Black", fen: "rn1qk2r/ppp2ppp/3bbn2/3p4/8/2N2N2/PPPP1PPP/R1BQ1RK1 b kq - 5 7", solution: ["e8g8", "f1e1", "b8c6"] },
  // Hard (Complex tactical sequences)
  { diff: 3, desc: "Complex tactical sequence for White", fen: "r2qkb1r/pp2pppp/2n2n2/1B1p4/3P2b1/2N2N2/PPP2PPP/R1BQK2R w KQkq - 5 7", solution: ["h2h3", "g4f3", "d1f3"] },
  { diff: 3, desc: "Win significant material", fen: "rn1qkb1r/pp3ppp/2p1pn2/3p1b2/2PP4/2N1PN2/PP3PPP/R1BQKB1R w KQkq - 2 6", solution: ["c4d5", "c6d5", "d1b3"] },
  { diff: 3, desc: "Find the best attacking line", fen: "r1bqkb1r/pp3ppp/2n1pn2/2pp4/2PP4/2N1PN2/PP3PPP/R1BQKB1R w KQkq - 2 6", solution: ["c4d5", "e6d5", "f1b5"] },
  { diff: 3, desc: "Master level sequence for Black", fen: "r2qk2r/ppp2ppp/2n1bn2/2bpp3/4P3/2PP1N2/PPB2PPP/RNBQ1RK1 b kq - 4 8", solution: ["d5e4", "d3e4", "d8d1"] },
  { diff: 3, desc: "Find the winning advantage", fen: "r1bqk2r/ppp2ppp/2n2n2/2bpp3/4P3/2PP1N2/PPB2PPP/RNBQ1RK1 w kq - 4 8", solution: ["e4d5", "f6d5", "d1e2"] },
  { diff: 3, desc: "Tactical masterclass for White", fen: "r3k2r/1pp2ppp/2n1bn2/p2qp3/8/2PPPN2/PP2B1PP/R2Q1RK1 w kq - 0 11", solution: ["e3e4", "d5c5", "g1h1"] },
  { diff: 3, desc: "Find the best defense and counter", fen: "r1bq1rk1/1pp2ppp/p1np1n2/2b1p3/2B1P3/2PP1N2/PP3PPP/RNBQ1RK1 w - - 0 8", solution: ["c1g5", "h7h6", "g5h4"] },
  { diff: 3, desc: "Complex positional win", fen: "r2qk2r/1p1b1ppp/p1n1pn2/2bp4/3P4/2N1PN2/PP1BBPPP/R2Q1RK1 b kq - 0 10", solution: ["c5d6", "a1c1", "e8g8"] }
];

const enginePool = new EnginePool();
let puzzleSolution = [];
let currentPuzzleStep = 0;
let puzzleDifficulty = 1;
let puzzlesSolvedAtCurrentDifficulty = 0;
let playedPuzzles = [];
let currentPuzzleDesc = "";

function startOfflinePuzzle() {
  if (typeof isGamePaused !== 'undefined') isGamePaused = false;
  
  // Hide Next Button
  const nextBtn = document.getElementById('btnNextPuzzle');
  if (nextBtn) nextBtn.classList.add('hidden');

  // Filter puzzles by current difficulty and not played
  let availablePuzzles = PUZZLE_SEED.filter(p => p.diff === puzzleDifficulty && !playedPuzzles.includes(p.fen));
  
  // If we ran out of puzzles at this difficulty, try next difficulty
  if (availablePuzzles.length === 0) {
    if (puzzleDifficulty < 3) {
      puzzleDifficulty++;
      puzzlesSolvedAtCurrentDifficulty = 0;
      availablePuzzles = PUZZLE_SEED.filter(p => p.diff === puzzleDifficulty && !playedPuzzles.includes(p.fen));
    }
    
    // If STILL 0 (e.g. played all puzzles of all difficulties), reset played history
    if (availablePuzzles.length === 0) {
      playedPuzzles = [];
      puzzleDifficulty = 1;
      puzzlesSolvedAtCurrentDifficulty = 0;
      availablePuzzles = PUZZLE_SEED.filter(p => p.diff === puzzleDifficulty);
    }
  }

  const randomPuzzle = availablePuzzles[Math.floor(Math.random() * availablePuzzles.length)];
  playedPuzzles.push(randomPuzzle.fen);
  
  loadPuzzleData(randomPuzzle.fen, randomPuzzle.solution, randomPuzzle.desc);
}

function handlePuzzleSuccess() {
  puzzlesSolvedAtCurrentDifficulty++;
  if (puzzlesSolvedAtCurrentDifficulty >= 3 && puzzleDifficulty < 3) {
    puzzleDifficulty++;
    puzzlesSolvedAtCurrentDifficulty = 0;
    console.log("Puzzle difficulty increased to", puzzleDifficulty);
  }
  const infoEl = document.getElementById('game-info-panel');
  if (infoEl) infoEl.innerText = `Solved! Correct! 🎉`;
  
  // Show Next Button
  const nextBtn = document.getElementById('btnNextPuzzle');
  if (nextBtn) nextBtn.classList.remove('hidden');
}

function loadPuzzleData(fen, solution, desc) {
  gameMode = 'puzzle';
  closeWelcomeScreen();
  puzzleSolution = solution; 
  currentPuzzleDesc = desc || "Find the best move!";
  currentPuzzleStep = 0;
  game.load(fen);
  playerColor = game.turn();
  boardFlipped = (playerColor === 'b');
  updateBoard();
  triggerEvaluation(12);
  const infoEl = document.getElementById('game-info-panel');
  if (infoEl) infoEl.innerText = currentPuzzleDesc;
}

function handlePuzzleMove(move) {
  const expectedMove = puzzleSolution[currentPuzzleStep];
  const userMoveStr = move.from + move.to + (move.promotion || '');
  
  if (userMoveStr === expectedMove || expectedMove === (move.from + move.to)) {
    currentPuzzleStep++;
    if (currentPuzzleStep >= puzzleSolution.length) {
      handlePuzzleSuccess();
    } else {
      setTimeout(() => {
        const replyMove = puzzleSolution[currentPuzzleStep];
        game.move(replyMove, { sloppy: true });
        updateBoard();
        if (typeof AudioController !== 'undefined') AudioController.play('move');
        currentPuzzleStep++;
        if (currentPuzzleStep >= puzzleSolution.length) {
          handlePuzzleSuccess();
        }
      }, 500);
    }
  } else {
    game.undo();
    updateBoard();
    if (boardEl) {
      const fromEl = boardEl.querySelector(`[data-square="${move.from}"] .piece`);
      if (fromEl) { fromEl.classList.add('shake'); setTimeout(() => fromEl.classList.remove('shake'), 400); }
    }
    const infoEl = document.getElementById('game-info-panel');
    if (infoEl) infoEl.innerText = "Incorrect, try again.";
  }
}

function showPuzzleHint() {
  if (gameMode !== 'puzzle') return;
  const nextMove = puzzleSolution[currentPuzzleStep];
  if (nextMove) {
    const from = nextMove.substring(0, 2);
    const to = nextMove.substring(2, 4);
    clearSVG();
    drawArrow(from, to);
    const infoEl = document.getElementById('game-info-panel');
    if (infoEl) infoEl.innerText = "Look at the orange arrow!";
  }
}

function showPuzzleSolution() {
  if (gameMode !== 'puzzle') return;
  const playNext = () => {
    if (currentPuzzleStep >= puzzleSolution.length) {
      const infoEl = document.getElementById('game-info-panel');
      if (infoEl) infoEl.innerText = "Puzzle Solved!";
      setTimeout(() => startOfflinePuzzle(), 1500);
      return;
    }
    const moveStr = puzzleSolution[currentPuzzleStep];
    const res = game.move(moveStr, { sloppy: true });
    if (res) {
      updateBoard();
      if (typeof AudioController !== 'undefined') AudioController.play('move');
      currentPuzzleStep++;
      setTimeout(playNext, 800);
    }
  };
  playNext();
}
</script>
